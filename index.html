<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>홈페이지 제작 진도</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="제작 진도">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f5f6f8;--panel:#fff;--border:#e5e7eb;--border-soft:#f3f4f6;
    --text:#111827;--text-muted:#6b7280;--text-light:#9ca3af;
    --primary:#4f46e5;--primary-soft:#eef2ff;--primary-hover:#4338ca;
    --success:#10b981;--success-soft:#d1fae5;
    --warning:#f59e0b;--warning-soft:#fef3c7;
    --danger:#ef4444;--danger-soft:#fee2e2;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.02);
    --shadow-lg:0 4px 12px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
    --r:12px;--r-sm:8px;--r-xs:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  button{cursor:pointer;border:none;background:none}
  input,select,textarea{border:1px solid var(--border);border-radius:var(--r-xs);padding:7px 10px;background:#fff;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--primary)}
  textarea{resize:vertical;min-height:60px;font-family:inherit}
  #app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:#fff;border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:24px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{flex:1;padding:32px;max-width:calc(100vw - 240px);overflow-x:hidden}
  .logo{font-weight:700;font-size:16px;letter-spacing:-.02em;padding:0 8px}
  .logo small{display:block;color:var(--text-muted);font-weight:500;font-size:12px;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{text-align:left;padding:10px 12px;border-radius:var(--r-xs);color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:10px;transition:all .12s}
  .nav button:hover{background:var(--border-soft);color:var(--text)}
  .nav button.active{background:var(--primary-soft);color:var(--primary)}
  .nav-icon{width:16px;height:16px;flex-shrink:0}
  .dday-box{background:var(--bg);border-radius:var(--r-sm);padding:12px 14px;font-size:12px}
  .dday-box .lbl{color:var(--text-muted);margin-bottom:2px}
  .dday-box .val{font-weight:700;font-size:15px;letter-spacing:-.02em}
  .dday-box+.dday-box{margin-top:8px}
  .dday-num{color:var(--primary)}
  .dday-past{color:var(--danger)}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .page-head h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .page-head .sub{color:var(--text-muted);margin-top:2px;font-size:13px}
  .btn{padding:8px 14px;border-radius:var(--r-xs);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;border:1px solid transparent}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-hover)}
  .btn-soft{background:var(--primary-soft);color:var(--primary)}
  .btn-soft:hover{background:#dbe2ff}
  .btn-ghost{background:transparent;color:var(--text-muted);border-color:var(--border)}
  .btn-ghost:hover{background:var(--border-soft);color:var(--text)}
  .btn-danger{background:transparent;color:var(--danger)}
  .btn-danger:hover{background:var(--danger-soft)}
  .btn-success{background:var(--success);color:#fff}
  .btn-success:hover{background:#059669}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-xs);color:var(--text-muted)}
  .btn-icon:hover{background:var(--border-soft);color:var(--text)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .card+.card{margin-top:16px}
  .grid{display:grid;gap:16px}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .grid-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .kpi{padding:18px}
  .kpi .lbl{color:var(--text-muted);font-size:12px;font-weight:500}
  .kpi .val{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:4px}
  .pbar{height:6px;background:var(--border-soft);border-radius:99px;overflow:hidden}
  .pbar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
  .pbar-fill.full{background:var(--success)}
  .donut{position:relative;width:160px;height:160px;margin:0 auto}
  .donut svg{transform:rotate(-90deg)}
  .donut-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut-text .pct{font-size:32px;font-weight:700;letter-spacing:-.03em}
  .donut-text .lbl{color:var(--text-muted);font-size:11px;margin-top:2px}
  .page-card{cursor:pointer;transition:all .15s}
  .page-card:hover{box-shadow:var(--shadow-lg);border-color:#d1d5db}
  .page-card-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:12px}
  .page-card-title{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .page-card-abbr{display:inline-block;background:var(--border-soft);color:var(--text-muted);font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:4px;font-family:'SF Mono',Menlo,monospace}
  .page-card-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;font-size:12px;color:var(--text-muted)}
  .release-tag{background:#fef3c7;color:#92400e;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600}
  .release-tag.empty{background:var(--border-soft);color:var(--text-muted)}
  .flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .flag-row{display:flex;flex-wrap:wrap;gap:4px}
  .flag-진행중{background:#dbeafe;color:#1e40af}
  .flag-제작중{background:#ede9fe;color:#5b21b6}
  .flag-수정중{background:#ffedd5;color:#9a3412}
  .flag-보류{background:#f3f4f6;color:#374151}
  .flag-검토{background:#fef9c3;color:#854d0e}
  .flag-이슈{background:var(--danger-soft);color:#991b1b}
  .flag-picker{display:flex;flex-wrap:wrap;gap:6px}
  .flag-pill{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);color:var(--text-muted);background:#fff;cursor:pointer}
  .flag-pill.on{border-color:transparent}
  .back-btn{color:var(--text-muted);font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
  .back-btn:hover{color:var(--text)}
  .page-detail-head{display:flex;align-items:start;justify-content:space-between;gap:16px;margin-bottom:8px;flex-wrap:wrap}
  .page-name-input{font-size:22px;font-weight:700;letter-spacing:-.02em;border:none;padding:2px 4px;background:transparent;width:100%}
  .page-name-input:hover{background:var(--border-soft)}
  .meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
  .meta-row label{color:var(--text-muted);font-size:12px}
  .abbr-input{width:80px;font-family:'SF Mono',Menlo,monospace;font-size:12px;font-weight:600;text-transform:uppercase}
  .checks-row{display:flex;flex-wrap:wrap;gap:12px;padding:14px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:16px;align-items:center}
  .checks-label{color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .check-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none;padding:4px 8px;border-radius:var(--r-xs);transition:background .1s}
  .check-item:hover{background:#fff}
  .check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);padding:0}
  .section-card{border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:12px;overflow:hidden;background:#fff}
  .section-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
  .section-head:hover{background:#fafbfc}
  .section-toggle{color:var(--text-muted);transition:transform .2s;flex-shrink:0;font-size:10px}
  .section-toggle.open{transform:rotate(90deg)}
  .section-name{font-weight:600;flex:1;min-width:120px;font-size:14px}
  .section-name input{font-weight:600;border:none;padding:2px 4px;background:transparent;width:100%}
  .section-name input:hover{background:var(--border-soft)}
  .section-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
  .section-progress .pbar{width:80px}
  .section-body{padding:16px;border-top:1px solid var(--border-soft);background:var(--bg);display:none}
  .section-body.open{display:block}
  .elem{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden}
  .elem-row{display:flex;align-items:center;gap:10px;padding:10px 12px;flex-wrap:wrap}
  .elem-id{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text-muted);background:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0;font-weight:600}
  .elem-type-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
  .elem-type-text{background:#e0f2fe;color:#075985}
  .elem-type-image{background:#fce7f3;color:#9d174d}
  .elem-type-object{background:#f3e8ff;color:#6b21a8}
  .elem-label{flex:1;min-width:120px;border:none;padding:4px 6px;background:transparent}
  .elem-label:hover{background:var(--border-soft);border-radius:4px}
  .elem-actions{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .ix-toggle-btn{font-size:11px;padding:3px 8px;border-radius:var(--r-xs);background:var(--border-soft);color:var(--text-muted);font-weight:600;transition:all .1s}
  .ix-toggle-btn.active{background:#fef3c7;color:#92400e}
  .ix-toggle-btn.done{background:var(--success-soft);color:#065f46}
  .ix-toggle-btn:hover{background:#e5e7eb}
  .asset-row{padding:0 12px 10px;display:flex;align-items:center;gap:6px}
  .asset-row label{font-size:11px;color:var(--text-muted);font-weight:600;flex-shrink:0}
  .asset-row input{flex:1;font-size:12px;padding:5px 8px}
  .asset-row a{font-size:11px;color:var(--primary);text-decoration:none;font-weight:600;flex-shrink:0;padding:5px 8px}
  .ix-panel{padding:14px;border-top:1px solid var(--border-soft);background:#fafbfc;display:none}
  .ix-panel.open{display:block}
  .ix-panel-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .ix-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .ix-field label{display:block;font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .ix-field input,.ix-field select,.ix-field textarea{width:100%;font-size:13px}
  .ix-field-full{grid-column:1/-1}
  .ix-field-check{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 0}
  .ix-field-check input{width:16px;height:16px;accent-color:var(--primary);padding:0;margin:0}
  .ix-section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;grid-column:1/-1;padding-top:10px;border-top:1px dashed var(--border)}
  .ix-section-title:first-child{margin-top:0;padding-top:0;border-top:none}
  .ix-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-soft)}
  .ix-summary-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13px;align-items:start}
  .ix-summary-grid dt{color:var(--text-muted);font-weight:500;font-size:12px}
  .ix-summary-grid dd{font-weight:500;word-break:break-word}
  .ix-summary-grid dd a{color:var(--primary);text-decoration:none}
  .ix-summary-section{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;padding-top:6px;border-top:1px dashed var(--border)}
  .ix-summary-section:first-child{margin-top:0;padding-top:0;border-top:none}
  .add-elem-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .add-elem-row .btn{font-size:12px;padding:6px 10px}
  .table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r);overflow:hidden}
  .table th,.table td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border-soft);font-size:13px}
  .table th{background:var(--bg);font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em}
  .table tr:last-child td{border-bottom:none}
  .table tr.clickable{cursor:pointer}
  .table tr.clickable:hover{background:#fafbfc}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-bar select,.filter-bar input{font-size:13px;padding:6px 10px}
  .ix-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:14px}
  .ix-card-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:8px}
  .ix-card-loc{font-size:11px;color:var(--text-muted);font-weight:600}
  .ix-card-label{font-weight:600;margin:2px 0 8px;font-size:14px}
  .ix-card-link{display:inline-flex;align-items:center;gap:3px;color:var(--primary);font-size:12px;margin-top:6px;font-weight:600;text-decoration:none}
  .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
  .empty-msg{font-size:14px;margin-bottom:14px}
  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-soft);gap:16px;flex-wrap:wrap}
  .setting-row:last-child{border-bottom:none}
  .setting-row label{font-weight:500}
  .setting-row .desc{color:var(--text-muted);font-size:12px;margin-top:2px}
  .stage-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .stage-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border-radius:var(--r-sm)}
  .stage-item input{flex:1}
  .reorder{display:flex;flex-direction:column;gap:0}
  .reorder button{font-size:10px;padding:0 4px;color:var(--text-light);line-height:1;background:transparent;border:none}
  .reorder button:hover{color:var(--text)}
  .reorder button:disabled{opacity:.3;cursor:default}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-bg.hidden{display:none}
  .modal{background:#fff;border-radius:var(--r);padding:24px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.2)}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .modal p{color:var(--text-muted);font-size:13px;margin-bottom:18px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translate(-50%,-4px)}
  .toast.error{background:var(--danger)}
  @media(max-width:900px){
    #app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;flex-wrap:wrap;padding:16px;gap:12px}
    .sidebar>*{flex:0 0 auto}
    .nav{flex-direction:row;flex-wrap:wrap;gap:4px}
    .dday-box{display:none}
    .main{max-width:100%;padding:20px}
  }
  .hide{display:none!important}
  .muted{color:var(--text-muted)}
  .small{font-size:12px}
  .gap-8{gap:8px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  code{background:var(--border-soft);padding:1px 5px;border-radius:3px;font-size:12px;font-family:'SF Mono',Menlo,monospace}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="logo">홈페이지 제작 진도<small>helixamc</small></div>
    <nav class="nav" id="nav">
      <button data-view="dashboard" class="active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>대시보드</button>
      <button data-view="pages"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>페이지 관리</button>
      <button data-view="images"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>에셋 모아보기</button>
      <button data-view="interactions"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>인터랙션 모아보기</button>
      <button data-view="settings"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>설정</button>
    </nav>
    <div id="dday-area"></div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="toast error" id="toast"></div>
<div class="modal-bg hidden" id="confirm-modal">
  <div class="modal">
    <h3 id="confirm-title">삭제 확인</h3>
    <p id="confirm-msg">정말 삭제하시겠어요?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirm-cancel">취소</button>
      <button class="btn btn-primary" id="confirm-ok" style="background:var(--danger)">삭제</button>
    </div>
  </div>
</div>

<script>
// ============== FIREBASE ==============
const firebaseConfig = {

// ============== STATE ==============
let state = {meta:{가오픈일:'',정식오픈일:'',stages:[...DEFAULT_RELEASES]},pages:[]};
let view='dashboard', selPage=null;
let openSections=new Set(), openIxPanels=new Set(), editingIx=new Set();

function normalizeState(){
  if(!state.pages) state.pages=[];
  if(!state.meta) state.meta={};
  if(!state.meta.stages) state.meta.stages=[...DEFAULT_RELEASES];
  if(!state.meta.가오픈일) state.meta.가오픈일='';
  if(!state.meta.정식오픈일) state.meta.정식오픈일='';
  state.pages.forEach(p=>{
    if(!p.checks) p.checks={};
    PAGE_TASKS.forEach(k=>{if(p.checks[k]===undefined)p.checks[k]=false;});
    if(!p.flags) p.flags=[];
    if(!p.sections) p.sections=[];
    p.sections.forEach(s=>{
      if(!s.stages) s.stages={};
      SECTION_STAGES.forEach(k=>{if(s.stages[k]===undefined)s.stages[k]=(s.checks&&s.checks[k])||false;});
      if(!s.flags) s.flags=[];
      if(!s.elements) s.elements=[];
      s.elements.forEach(e=>{
        if(e.type==='etc') e.type='object';
        if(e.assetPath===undefined) e.assetPath='';
        if(e.ix&&e.ix.params===undefined) e.ix.params={};
      });
    });
  });
}
async function load(){
  try{
    const snap = await db.ref(DB_REF).once('value');
    if(snap.val()) state = snap.val();
  }catch(e){console.error('Load failed',e);}
  normalizeState();
}
let lastLocalWrite = 0;
const ECHO_WINDOW_MS = 1500;
function subscribe(){
  db.ref(DB_REF).on('value', snap => {
    if(Date.now() - lastLocalWrite < ECHO_WINDOW_MS) return;
    if(inputTimer) return;
    const v = snap.val();

    state = v;

    render();
  }, err => console.error('Sync error', err));

// ============== CALC ==============
function isAsset(e){return e.type==='image'||e.type==='object';}
function calcSection(s){
  let total=0,done=0;
  if(s.stages) Object.values(s.stages).forEach(v=>{total++;if(v)done++;});
  (s.elements||[]).forEach(e=>{
    if(isAsset(e)){total++;if(e.done)done++;}
    if(e.ix&&e.ix.on){total++;if(e.ix.done)done++;}
  });
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function calcPage(p){
  let total=0,done=0;
  if(p.checks) Object.values(p.checks).forEach(v=>{total++;if(v)done++;});
  (p.sections||[]).forEach(s=>{const c=calcSection(s);total+=c.total;done+=c.done;});
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function calcAll(){
  let total=0,done=0;
  state.pages.forEach(p=>{const c=calcPage(p);total+=c.total;done+=c.done;});
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function genId(p,s,idx){
  return `${(p.abbr||'?').toUpperCase()}-${(s.abbr||'?').toUpperCase()}-${String(idx+1).padStart(3,'0')}`;
}
let _assetIdxCache=new WeakMap();
function assetIdx(s,eid){
  let map=_assetIdxCache.get(s);
  if(!map){
    map=new Map();let i=0;
    for(const e of(s.elements||[])){if(isAsset(e)){map.set(e.id,i);i++;}}
    _assetIdxCache.set(s,map);
  }
  const v=map.get(eid);
  return v===undefined?-1:v;
}
function ddayText(d){
  if(!d) return null;
  const today=new Date();today.setHours(0,0,0,0);
  const t=new Date(d);t.setHours(0,0,0,0);
  const diff=Math.round((t-today)/86400000);
  if(diff===0)return{text:'D-DAY',past:false};
  if(diff>0)return{text:`D-${diff}`,past:false};
  return{text:`D+${-diff}`,past:true};
}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function safeUrl(u){
  if(!u) return '';
  const s=String(u).trim();
  if(/^(https?:|mailto:|tel:)/i.test(s)) return esc(s);
  if(/^[\/.]/.test(s)) return esc(s);
  if(/^[a-z0-9._-]+(\/|$)/i.test(s)&&!/^javascript:/i.test(s)) return esc(s);
  return '#';
}

function donut(pct){
  const r=58,c=2*Math.PI*r,off=c-(pct/100)*c;
  return`<div class="donut"><svg width="160" height="160"><circle cx="80" cy="80" r="${r}" stroke="#eef0f3" stroke-width="14" fill="none"/><circle cx="80" cy="80" r="${r}" stroke="${pct===100?'#10b981':'#4f46e5'}" stroke-width="14" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/></svg><div class="donut-text"><div class="pct">${pct}%</div><div class="lbl">전체 진행률</div></div></div>`;
}

  if(stagesToShow.length){

  <div class="pbar" style="margin-bottom:16px"><div class="pbar-fill ${c.pct===100?'full':''}" style="width:${c.pct}%"></div></div>
  <div style="margin-bottom:8px"><div class="muted small" style="margin-bottom:6px;font-weight:600">상태 플래그</div>
    <div class="flag-picker">${FLAGS.map(f=>{const on=(p.flags||[]).includes(f);return`<button class="flag-pill ${on?'on flag '+FLAG_CLS[f]:''}" title="${esc(FLAG_DEFS[f])}" data-act="toggle-page-flag" data-id="${p.id}" data-flag="${f}">${f}</button>`;}).join('')}</div>
  </div>
  <div class="checks-row"><div class="checks-label">페이지 작업</div>${PAGE_TASKS.map(k=>`<label class="check-item"><input type="checkbox" data-act="toggle-page-check" data-id="${p.id}" data-key="${k}" ${p.checks&&p.checks[k]?'checked':''}/>${k}</label>`).join('')}</div>
  <div class="row" style="justify-content:space-between;margin:20px 0 12px"><h3 style="font-size:15px;font-weight:700">섹션 (${(p.sections||[]).length}개)</h3><button class="btn btn-soft btn-sm" data-act="add-section" data-id="${p.id}">+ 섹션 추가</button></div>`;
  if(!(p.sections||[]).length) h+=`<div class="card empty"><div class="empty-icon">📑</div><div class="empty-msg">섹션을 추가하세요.</div></div>`;
  else (p.sections||[]).forEach((s,si)=>h+=renderSection(p,s,si));
  return h;
}

function renderSection(p,s,si){
  const c=calcSection(s),open=openSections.has(s.id);
  let h=`<div class="section-card">
    <div class="section-head" data-act="toggle-section" data-id="${s.id}">
      <span class="section-toggle ${open?'open':''}">▶</span>
      <div class="section-name" onclick="event.stopPropagation()"><input data-act="edit-section-name" data-pid="${p.id}" data-sid="${s.id}" value="${esc(s.name)}" placeholder="섹션 이름"/></div>
      <input class="abbr-input" onclick="event.stopPropagation()" data-act="edit-section-abbr" data-pid="${p.id}" data-sid="${s.id}" value="${esc(s.abbr||'')}" placeholder="HERO" maxlength="8"/>
      <div class="section-progress"><div class="pbar"><div class="pbar-fill ${c.pct===100?'full':''}" style="width:${c.pct}%"></div></div><span style="font-weight:700;color:var(--text)">${c.pct}%</span><span>${c.done}/${c.total}</span></div>
      <div class="reorder" onclick="event.stopPropagation()">
        <button data-act="move-section-up" data-pid="${p.id}" data-sid="${s.id}" ${si===0?'disabled':''}>▲</button>
        <button data-act="move-section-down" data-pid="${p.id}" data-sid="${s.id}" ${si===p.sections.length-1?'disabled':''}>▼</button>
      </div>
      <button class="btn-icon" onclick="event.stopPropagation()" data-act="del-section" data-pid="${p.id}" data-sid="${s.id}">×</button>
    </div>`;
  if(open){
    h+=`<div class="section-body open">
      <div style="margin-bottom:10px"><div class="muted small" style="margin-bottom:5px;font-weight:600">섹션 플래그</div><div class="flag-picker">${FLAGS.map(f=>{const on=(s.flags||[]).includes(f);return`<button class="flag-pill ${on?'on flag '+FLAG_CLS[f]:''}" title="${esc(FLAG_DEFS[f])}" data-act="toggle-section-flag" data-pid="${p.id}" data-sid="${s.id}" data-flag="${f}">${f}</button>`;}).join('')}</div></div>
      <div class="checks-row" style="margin-bottom:12px"><div class="checks-label">섹션 단계</div>${SECTION_STAGES.map(k=>`<label class="check-item"><input type="checkbox" data-act="toggle-section-stage" data-pid="${p.id}" data-sid="${s.id}" data-key="${k}" ${s.stages&&s.stages[k]?'checked':''}/>${k}</label>`).join('')}</div>
      <div class="muted small" style="margin-bottom:6px;font-weight:600">유닛</div>`;
    if(!(s.elements||[]).length) h+=`<div class="card empty" style="padding:24px"><div class="empty-msg small">유닛을 추가하세요.</div></div>`;
    else (s.elements||[]).forEach((e,ei)=>h+=renderElem(p,s,e,ei));
    h+=`<div class="add-elem-row">
      <button class="btn btn-soft" data-act="add-elem" data-pid="${p.id}" data-sid="${s.id}" data-type="object">오브젝트</button>
      <button class="btn btn-soft" data-act="add-elem" data-pid="${p.id}" data-sid="${s.id}" data-type="image">이미지/영상</button>
      <button class="btn btn-soft" data-act="add-elem" data-pid="${p.id}" data-sid="${s.id}" data-type="text">+</button>
    </div></div>`;
  }
  return h+`</div>`;
}

function renderElem(p,s,e,ei){
  const ixOn=e.ix&&e.ix.on,panelOpen=openIxPanels.has(e.id),asset=isAsset(e);
  let id='';if(asset){const idx=assetIdx(s,e.id);id=genId(p,s,idx);}
  const typeLabel=e.type==='text'?'유닛':e.type==='image'?'이미지/영상':'오브젝트';
  const typeCls=`elem-type-${e.type}`;
  const ph=e.type==='text'?'설명':e.type==='image'?'이미지 설명 (예: 강아지 진료)':'오브젝트 설명 (예: 진료 프로세스 다이어그램)';
  let h=`<div class="elem">
    <div class="elem-row">
      ${id?`<span class="elem-id">${id}</span>`:''}
      <span class="elem-type-badge ${typeCls}">${typeLabel}</span>
      <input class="elem-label" data-act="edit-elem-label" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" value="${esc(e.label||'')}" placeholder="${ph}"/>
      ${asset?`<label class="check-item" style="padding:0"><input type="checkbox" data-act="toggle-elem-done" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" ${e.done?'checked':''}/><span class="small">완료</span></label>`:''}
      <div class="elem-actions">
        ${ixOn?`<label class="check-item" style="padding:0"><input type="checkbox" data-act="toggle-ix-done" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" ${e.ix.done?'checked':''}/><span class="small">⚡완료</span></label>`:''}
        <button class="ix-toggle-btn ${ixOn?(e.ix.done?'done':'active'):''}" data-act="toggle-ix-panel" data-eid="${e.id}">⚡${ixOn?'':'추가'}</button>
        <div class="reorder">
          <button data-act="move-elem-up" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" ${ei===0?'disabled':''}>▲</button>
          <button data-act="move-elem-down" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" ${ei===s.elements.length-1?'disabled':''}>▼</button>
        </div>
        <button class="btn-icon" data-act="del-elem" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}">×</button>
      </div>
    </div>`;
  if(asset) h+=`<div class="asset-row"><label>📁</label><input data-act="edit-elem-asset" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" value="${esc(e.assetPath||'')}" placeholder="파일 경로 또는 URL"/>${e.assetPath?`<a href="${safeUrl(e.assetPath)}" target="_blank" rel="noopener noreferrer">열기 ↗</a>`:''}</div>`;
  if(panelOpen) h+=renderIxPanel(p,s,e);
  return h+`</div>`;
}

function renderIxPanel(p,s,e){
  const ix=e.ix||{},on=!!ix.on,editing=editingIx.has(e.id);
  let h=`<div class="ix-panel open"><div class="ix-panel-header"><label class="check-item" style="font-weight:600;padding:0"><input type="checkbox" data-act="toggle-ix-on" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" ${on?'checked':''}/>인터랙션 적용</label>${on&&!editing?`<button class="btn btn-ghost btn-sm" data-act="ix-edit" data-eid="${e.id}">수정</button>`:''}</div>`;
  if(on){h+=editing?renderIxForm(p,s,e,ix):renderIxSummary(ix);}
  return h+`</div>`;
}

function renderIxForm(p,s,e,ix){
  const params=ix.params||{},action=ix.action||ACTIONS[0],aFields=ACTION_FIELDS[action]||[];
  let h=`<div class="ix-grid">
    <div class="ix-section-title">기본</div>
    <div class="ix-field"><label>트리거</label><select data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="trigger">${TRIGGERS.map(t=>`<option ${ix.trigger===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-field"><label>동작</label><select data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="action">${ACTIONS.map(t=>`<option ${ix.action===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-field"><label>디바이스</label><select data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="device">${DEVICES.map(t=>`<option ${ix.device===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-section-title">타이밍</div>
    <div class="ix-field"><label>지속시간 (초)</label><input type="number" step="0.05" min="0" data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="duration" value="${esc(ix.duration||'')}" placeholder="0.6"/></div>
    <div class="ix-field"><label>지연 (초)</label><input type="number" step="0.05" min="0" data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="delay" value="${esc(ix.delay||'')}" placeholder="0"/></div>
    <div class="ix-field"><label>이징</label><select data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="easing">${EASINGS.map(t=>`<option ${ix.easing===t?'selected':''}>${t}</option>`).join('')}</select></div>`;
  if(aFields.length){
    h+=`<div class="ix-section-title">${esc(action)} 설정</div>`;
    aFields.forEach(f=>{
      const val=params[f.key];
      if(f.type==='checkbox') h+=`<div class="ix-field-check"><input type="checkbox" data-act="set-ix-param" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="${f.key}" ${val?'checked':''}/><label style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)">${esc(f.label)}</label></div>`;
      else if(f.type==='select') h+=`<div class="ix-field"><label>${esc(f.label)}</label><select data-act="set-ix-param" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="${f.key}"><option value="">선택</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
      else if(f.type==='textarea') h+=`<div class="ix-field ix-field-full"><label>${esc(f.label)}</label><textarea data-act="set-ix-param" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(val||'')}</textarea></div>`;
      else h+=`<div class="ix-field"><label>${esc(f.label)}</label><input type="${f.type||'text'}" ${f.step?`step="${f.step}"`:''} data-act="set-ix-param" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="${f.key}" value="${esc(val||'')}" placeholder="${esc(f.placeholder||'')}"/></div>`;
    });
  }
  h+=`<div class="ix-section-title">참고</div>
    <div class="ix-field ix-field-full"><label>참고 링크</label><input data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="link" value="${esc(ix.link||'')}" placeholder="https://..."/></div>
    <div class="ix-field ix-field-full"><label>메모</label><textarea data-act="set-ix" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-key="memo" placeholder="상세 설명">${esc(ix.memo||'')}</textarea></div>
  </div>
  <div class="ix-actions"><button class="btn btn-success" data-act="ix-register" data-eid="${e.id}">✓ 등록</button></div>`;
  return h;
}

function renderIxSummary(ix){
  const params=ix.params||{},action=ix.action||'',aFields=ACTION_FIELDS[action]||[];
  let h=`<dl class="ix-summary-grid"><div class="ix-summary-section">기본</div>
    ${ix.trigger?`<dt>트리거</dt><dd>${esc(ix.trigger)}</dd>`:''}
    ${ix.action?`<dt>동작</dt><dd><strong>${esc(ix.action)}</strong></dd>`:''}
    ${ix.device?`<dt>디바이스</dt><dd>${esc(ix.device)}</dd>`:''}`;
  if(ix.duration||ix.delay||ix.easing){
    h+=`<div class="ix-summary-section">타이밍</div>`;
    if(ix.duration) h+=`<dt>지속</dt><dd>${esc(ix.duration)}s</dd>`;
    if(ix.delay) h+=`<dt>지연</dt><dd>${esc(ix.delay)}s</dd>`;
    if(ix.easing) h+=`<dt>이징</dt><dd>${esc(ix.easing)}</dd>`;
  }
  const filled=aFields.filter(f=>{const v=params[f.key];return f.type==='checkbox'?!!v:v!==undefined&&v!==''&&v!==null;});
  if(filled.length){
    h+=`<div class="ix-summary-section">${esc(action)}</div>`;
    filled.forEach(f=>{const v=params[f.key];h+=`<dt>${esc(f.label)}</dt><dd>${f.type==='checkbox'?'✓':esc(String(v))}</dd>`;});
  }
  if(ix.link||ix.memo){
    h+=`<div class="ix-summary-section">참고</div>`;
    if(ix.link) h+=`<dt>링크</dt><dd><a href="${safeUrl(ix.link)}" target="_blank" rel="noopener noreferrer">${esc(ix.link)} ↗</a></dd>`;
    if(ix.memo) h+=`<dt>메모</dt><dd style="white-space:pre-wrap">${esc(ix.memo)}</dd>`;
  }
  return h+`</dl>`;
}

function renderAssets(){
  const items=[];
  state.pages.forEach(p=>(p.sections||[]).forEach(s=>(s.elements||[]).forEach(e=>{if(isAsset(e)){const idx=assetIdx(s,e.id);items.push({id:genId(p,s,idx),page:p,section:s,elem:e});}})));
  let h=`<div class="page-head"><div><h2>에셋 모아보기</h2><div class="sub">${items.length}개</div></div></div>`;
  if(!items.length) return h+`<div class="card empty"><div class="empty-icon">🖼</div><div class="empty-msg">에셋이 없어요.</div></div>`;
  h+=`<div class="filter-bar">
    <select id="img-filter-status"><option value="all">전체 상태</option><option value="done">완료</option><option value="undone">미완료</option></select>
    <select id="img-filter-type"><option value="all">전체 유형</option><option value="image">이미지/영상</option><option value="object">오브젝트</option></select>
    <select id="img-filter-page"><option value="all">전체 페이지</option>${state.pages.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select>
    <input id="img-filter-search" placeholder="검색..." style="flex:1;min-width:160px"/>
  </div>
  <div class="card" style="padding:0;overflow:hidden"><table class="table" id="img-table">
    <thead><tr><th>ID</th><th>유형</th><th>위치</th><th>설명</th><th>경로</th><th>인터랙션</th><th>상태</th></tr></thead>
    <tbody>${items.map(it=>`<tr class="clickable" data-page="${it.page.id}" data-section="${it.section.id}" data-type="${it.elem.type}" data-status="${it.elem.done?'done':'undone'}" data-search="${esc((it.elem.label||'').toLowerCase())}" data-act="goto-elem">
      <td><span class="elem-id">${it.id}</span></td>
      <td><span class="elem-type-badge elem-type-${it.elem.type}">${it.elem.type==='image'?'이미지/영상':'오브젝트'}</span></td>
      <td class="muted small">${esc(it.page.name)} › ${esc(it.section.name)}</td>
      <td>${esc(it.elem.label||'(설명 없음)')}</td>
      <td class="small">${it.elem.assetPath?`<a href="${safeUrl(it.elem.assetPath)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:var(--primary);text-decoration:none">📁 열기</a>`:'<span class="muted">—</span>'}</td>
      <td class="small">${it.elem.ix&&it.elem.ix.on?`<span class="muted">⚡${esc(it.elem.ix.action||'')} ${it.elem.ix.done?'✓':''}</span>`:'<span class="muted">—</span>'}</td>
      <td>${it.elem.done?'<span class="flag" style="background:var(--success-soft);color:#065f46">완료</span>':'<span class="flag flag-보류">미완</span>'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  return h;
}

function renderInteractions(){
  const items=[];
  state.pages.forEach(p=>(p.sections||[]).forEach(s=>(s.elements||[]).forEach(e=>{if(e.ix&&e.ix.on){let id='';if(isAsset(e)){const idx=assetIdx(s,e.id);id=genId(p,s,idx);}items.push({page:p,section:s,elem:e,id});}})));
  let h=`<div class="page-head"><div><h2>인터랙션 모아보기</h2><div class="sub">${items.length}개</div></div></div>`;
  if(!items.length) return h+`<div class="card empty"><div class="empty-icon">⚡</div><div class="empty-msg">인터랙션이 없어요.</div></div>`;
  h+=`<div class="filter-bar">
    <select id="ix-filter-status"><option value="all">전체</option><option value="done">완료</option><option value="undone">미완</option></select>
    <select id="ix-filter-trigger"><option value="all">전체 트리거</option>${TRIGGERS.map(t=>`<option>${t}</option>`).join('')}</select>
    <select id="ix-filter-action"><option value="all">전체 동작</option>${ACTIONS.map(t=>`<option>${t}</option>`).join('')}</select>
    <input id="ix-filter-search" placeholder="검색..." style="flex:1;min-width:160px"/>
  </div><div class="grid grid-3" id="ix-grid">`;
  items.forEach(it=>{
    const ix=it.elem.ix,params=ix.params||{},aFields=ACTION_FIELDS[ix.action]||[];
    const filled=aFields.filter(f=>{const v=params[f.key];return f.type==='checkbox'?!!v:v!==undefined&&v!==''&&v!==null;});
    h+=`<div class="ix-card" data-page="${it.page.id}" data-section="${it.section.id}" data-status="${ix.done?'done':'undone'}" data-trigger="${esc(ix.trigger||'')}" data-action="${esc(ix.action||'')}" data-search="${esc((it.elem.label+' '+(ix.memo||'')).toLowerCase())}">
      <div class="ix-card-head"><div><div class="ix-card-loc">${esc(it.page.name)} › ${esc(it.section.name)}</div><div class="ix-card-label">${it.id?`<span class="elem-id" style="margin-right:6px">${it.id}</span>`:''}${esc(it.elem.label||'(설명 없음)')}</div></div>${ix.done?'<span class="flag" style="background:var(--success-soft);color:#065f46">✓ 완료</span>':`<button class="btn btn-ghost btn-sm" data-act="goto-ix" data-page="${it.page.id}" data-section="${it.section.id}" data-eid="${it.elem.id}">편집</button>`}</div>
      <dl class="ix-summary-grid">
        ${ix.trigger?`<dt>트리거</dt><dd>${esc(ix.trigger)}</dd>`:''}
        ${ix.action?`<dt>동작</dt><dd><strong>${esc(ix.action)}</strong></dd>`:''}
        ${ix.duration?`<dt>지속</dt><dd>${esc(ix.duration)}s${ix.delay?` · 지연 ${esc(ix.delay)}s`:''}</dd>`:''}
        ${ix.device?`<dt>디바이스</dt><dd>${esc(ix.device)}</dd>`:''}
        ${filled.map(f=>`<dt>${esc(f.label)}</dt><dd>${f.type==='checkbox'?'✓':esc(String(params[f.key]))}</dd>`).join('')}
      </dl>
      ${ix.link?`<a class="ix-card-link" href="${safeUrl(ix.link)}" target="_blank" rel="noopener noreferrer">참고 링크 ↗</a>`:''}
      ${ix.memo?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);font-size:12px;color:var(--text-muted);white-space:pre-wrap">${esc(ix.memo)}</div>`:''}
    </div>`;
  });
  return h+`</div>`;
}

function renderSettings(){
  const stages=state.meta.stages||[];
  return`<div class="page-head"><div><h2>설정</h2></div></div>
  <div class="card">
    <div class="setting-row"><div><label>가오픈일</label></div><input type="date" data-act="set-meta" data-key="가오픈일" value="${state.meta.가오픈일||''}"/></div>
    <div class="setting-row"><div><label>정식오픈일</label></div><input type="date" data-act="set-meta" data-key="정식오픈일" value="${state.meta.정식오픈일||''}"/></div>
  </div>
  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:6px"><div><label style="font-weight:600">출시 단계 관리</label><div class="desc" style="color:var(--text-muted);font-size:12px;margin-top:2px">자유롭게 추가/편집</div></div><button class="btn btn-soft btn-sm" data-act="add-stage">+ 추가</button></div>
    <div class="stage-list">${stages.map((st,i)=>`<div class="stage-item"><input data-act="edit-stage" data-idx="${i}" value="${esc(st)}" placeholder="단계 이름"/><div class="reorder"><button data-act="move-stage-up" data-idx="${i}" ${i===0?'disabled':''}>▲</button><button data-act="move-stage-down" data-idx="${i}" ${i===stages.length-1?'disabled':''}>▼</button></div><button class="btn-icon" data-act="del-stage" data-idx="${i}">×</button></div>`).join('')||'<div class="muted small">단계가 없어요.</div>'}</div>
  </div>
  <div class="card">
    <div class="setting-row"><div><label>내보내기</label><div class="desc" style="color:var(--text-muted);font-size:12px">JSON 백업</div></div><button class="btn btn-soft" data-act="export">내보내기</button></div>
    <div class="setting-row"><div><label>가져오기</label><div class="desc" style="color:var(--text-muted);font-size:12px">JSON 복원</div></div><input type="file" id="import-file" accept=".json" style="display:none"/><button class="btn btn-soft" data-act="import">가져오기</button></div>
    <div class="setting-row"><div><label style="color:var(--danger)">전체 초기화</label><div class="desc" style="color:var(--text-muted);font-size:12px">복구 불가</div></div><button class="btn btn-danger" data-act="reset">초기화</button></div>
  </div>`;
}

// ============== EVENTS ==============
function bindEvents(){
  ['img-filter-status','img-filter-type','img-filter-page','img-filter-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',applyAssetFilters);});
  ['ix-filter-status','ix-filter-trigger','ix-filter-action','ix-filter-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',applyIxFilters);});
  const imp=document.getElementById('import-file');if(imp)imp.addEventListener('change',handleImport);
}
function applyAssetFilters(){
  const st=document.getElementById('img-filter-status').value,tp=document.getElementById('img-filter-type').value,pg=document.getElementById('img-filter-page').value,sr=(document.getElementById('img-filter-search').value||'').toLowerCase();
  document.querySelectorAll('#img-table tbody tr').forEach(tr=>{
    let show=true;
    if(st!=='all'&&tr.dataset.status!==st)show=false;
    if(tp!=='all'&&tr.dataset.type!==tp)show=false;
    if(pg!=='all'&&tr.dataset.page!==pg)show=false;
    if(sr&&!tr.dataset.search.includes(sr))show=false;
    tr.style.display=show?'':'none';
  });
}
function applyIxFilters(){
  const st=document.getElementById('ix-filter-status').value,tr=document.getElementById('ix-filter-trigger').value,ac=document.getElementById('ix-filter-action').value,sr=(document.getElementById('ix-filter-search').value||'').toLowerCase();
  document.querySelectorAll('#ix-grid>.ix-card').forEach(c=>{
    let show=true;
    if(st!=='all'&&c.dataset.status!==st)show=false;
    if(tr!=='all'&&c.dataset.trigger!==tr)show=false;
    if(ac!=='all'&&c.dataset.action!==ac)show=false;
    if(sr&&!c.dataset.search.includes(sr))show=false;
    c.style.display=show?'':'none';
  });
}
function confirmDialog(msg,onOk){
  const m=document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent=msg;
  m.classList.remove('hidden');
  const cleanup=()=>{m.classList.add('hidden');ok.onclick=null;cancel.onclick=null;};
  const ok=document.getElementById('confirm-ok'),cancel=document.getElementById('confirm-cancel');
  ok.onclick=()=>{cleanup();onOk();};cancel.onclick=cleanup;
}
function findPage(pid){return state.pages.find(p=>p.id===pid);}
function findSection(p,sid){return p?(p.sections||[]).find(s=>s.id===sid):null;}
function findElem(s,eid){return s?(s.elements||[]).find(e=>e.id===eid):null;}

document.addEventListener('click',ev=>{
  const nav=ev.target.closest('#nav button[data-view]');
  if(nav){view=nav.dataset.view;selPage=null;render();return;}
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='goto-pages'){view='pages';selPage=null;render();return;}
  if(act==='back-pages'){selPage=null;render();return;}
  if(act==='open-page'){selPage=t.dataset.id;render();return;}
  if(act==='add-page'){
    const checks={};PAGE_TASKS.forEach(k=>checks[k]=false);
    const p={id:uid(),name:'새 페이지',abbr:'',release:'',flags:[],checks,sections:[]};
    state.pages.push(p);save();selPage=p.id;render();return;
  }
  if(act==='del-page'){confirmDialog('이 페이지를 삭제하시겠어요?',()=>{state.pages=state.pages.filter(p=>p.id!==t.dataset.id);selPage=null;save();render();});return;}
  if(act==='toggle-page-flag'){const p=findPage(t.dataset.id);if(!p)return;p.flags=p.flags||[];const f=t.dataset.flag;if(p.flags.includes(f))p.flags=p.flags.filter(x=>x!==f);else p.flags.push(f);save();render();return;}
  if(act==='toggle-section-flag'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.flags=s.flags||[];const f=t.dataset.flag;if(s.flags.includes(f))s.flags=s.flags.filter(x=>x!==f);else s.flags.push(f);save();render();return;}
  if(act==='add-section'){const p=findPage(t.dataset.id);if(!p)return;p.sections=p.sections||[];const stages={};SECTION_STAGES.forEach(k=>stages[k]=false);const s={id:uid(),name:'새 섹션',abbr:'',flags:[],stages,elements:[]};p.sections.push(s);openSections.add(s.id);save();render();return;}
  if(act==='toggle-section'){const sid=t.dataset.id;if(openSections.has(sid))openSections.delete(sid);else openSections.add(sid);render();return;}
  if(act==='del-section'){confirmDialog('섹션을 삭제하시겠어요?',()=>{const p=findPage(t.dataset.pid);if(!p)return;p.sections=(p.sections||[]).filter(s=>s.id!==t.dataset.sid);save();render();});return;}
  if(act==='move-section-up'||act==='move-section-down'){const p=findPage(t.dataset.pid);if(!p)return;const i=p.sections.findIndex(s=>s.id===t.dataset.sid),j=act==='move-section-up'?i-1:i+1;if(j<0||j>=p.sections.length)return;[p.sections[i],p.sections[j]]=[p.sections[j],p.sections[i]];save();render();return;}
  if(act==='add-elem'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.elements=s.elements||[];s.elements.push({id:uid(),type:t.dataset.type,label:'',done:false,assetPath:'',ix:null});save();render();return;}
  if(act==='del-elem'){confirmDialog('유닛을 삭제하시겠어요?',()=>{const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.elements=(s.elements||[]).filter(e=>e.id!==t.dataset.eid);save();render();});return;}
  if(act==='move-elem-up'||act==='move-elem-down'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;const i=s.elements.findIndex(e=>e.id===t.dataset.eid),j=act==='move-elem-up'?i-1:i+1;if(j<0||j>=s.elements.length)return;[s.elements[i],s.elements[j]]=[s.elements[j],s.elements[i]];save();render();return;}
  if(act==='toggle-ix-panel'){const eid=t.dataset.eid;if(openIxPanels.has(eid))openIxPanels.delete(eid);else openIxPanels.add(eid);render();return;}
  if(act==='ix-edit'){editingIx.add(t.dataset.eid);render();return;}
  if(act==='ix-register'){editingIx.delete(t.dataset.eid);save();render();return;}
  if(act==='goto-elem'){selPage=t.dataset.page;openSections.add(t.dataset.section);view='pages';render();return;}
  if(act==='goto-ix'){selPage=t.dataset.page;openSections.add(t.dataset.section);openIxPanels.add(t.dataset.eid);editingIx.add(t.dataset.eid);view='pages';render();return;}
  if(act==='add-stage'){state.meta.stages=state.meta.stages||[];state.meta.stages.push('새 단계');save();render();return;}
  if(act==='del-stage'){const idx=parseInt(t.dataset.idx);confirmDialog('단계를 삭제하시겠어요?',()=>{const removed=state.meta.stages[idx];state.meta.stages.splice(idx,1);state.pages.forEach(p=>{if(p.release===removed)p.release='';});save();render();});return;}
  if(act==='move-stage-up'||act==='move-stage-down'){const idx=parseInt(t.dataset.idx),j=act==='move-stage-up'?idx-1:idx+1;if(j<0||j>=state.meta.stages.length)return;[state.meta.stages[idx],state.meta.stages[j]]=[state.meta.stages[j],state.meta.stages[idx]];save();render();return;}
  if(act==='export'){doExport();return;}
  if(act==='import'){document.getElementById('import-file').click();return;}
  if(act==='reset'){confirmDialog('정말 모든 데이터를 삭제하시겠어요?',async()=>{state={meta:{가오픈일:'',정식오픈일:'',stages:[...DEFAULT_RELEASES]},pages:[]};selPage=null;openSections.clear();openIxPanels.clear();editingIx.clear();await save();render();});return;}
});

document.addEventListener('change',ev=>{
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='toggle-page-check'){const p=findPage(t.dataset.id);if(!p)return;p.checks=p.checks||{};p.checks[t.dataset.key]=t.checked;save();render();return;}
  if(act==='toggle-section-stage'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.stages=s.stages||{};s.stages[t.dataset.key]=t.checked;save();render();return;}
  if(act==='toggle-elem-done'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e)return;e.done=t.checked;save();render();return;}
  if(act==='toggle-ix-on'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e)return;if(t.checked){e.ix=e.ix||{trigger:'스크롤 진입',action:'페이드인',device:'둘다',duration:'0.6',delay:'0',easing:'ease-out',link:'',memo:'',done:false,params:{}};e.ix.on=true;editingIx.add(e.id);}else{if(e.ix)e.ix.on=false;editingIx.delete(e.id);}save();render();return;}
  if(act==='toggle-ix-done'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e||!e.ix)return;e.ix.done=t.checked;save();render();return;}
  if(act==='edit-page-release'){const p=findPage(t.dataset.id);if(!p)return;p.release=t.value;save();return;}
  if(act==='set-meta'){state.meta[t.dataset.key]=t.value;save();render();return;}
  if(act==='set-ix'&&t.dataset.key==='action'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e&&e.ix){e.ix.action=t.value;save();render();}return;}
  if(act==='set-ix-param'&&t.type==='checkbox'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e&&e.ix){e.ix.params=e.ix.params||{};e.ix.params[t.dataset.key]=t.checked;save();}return;}
  if(act==='edit-stage'){
    const idx=parseInt(t.dataset.idx),old=state.meta.stages[idx],val=t.value;
    if(old===val) return;
    state.meta.stages[idx]=val;
    state.pages.forEach(p=>{if(p.release===old)p.release=val;});
    save();render();return;
  }
});

let inputTimer=null;
document.addEventListener('input',ev=>{
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='edit-page-name'){const p=findPage(t.dataset.id);if(p)p.name=t.value;}
  else if(act==='edit-page-abbr'){const p=findPage(t.dataset.id);if(p)p.abbr=t.value.toUpperCase();}
  else if(act==='edit-section-name'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(s)s.name=t.value;}
  else if(act==='edit-section-abbr'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(s)s.abbr=t.value.toUpperCase();}
  else if(act==='edit-elem-label'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e)e.label=t.value;}
  else if(act==='edit-elem-asset'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e)e.assetPath=t.value;}
  else if(act==='set-ix'){if(t.dataset.key==='action')return;const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e&&e.ix)e.ix[t.dataset.key]=t.value;}
  else if(act==='set-ix-param'){if(t.type==='checkbox')return;const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e&&e.ix){e.ix.params=e.ix.params||{};e.ix.params[t.dataset.key]=t.value;}}
  else if(act==='set-meta'){state.meta[t.dataset.key]=t.value;}
  else return;
  clearTimeout(inputTimer);inputTimer=setTimeout(()=>{inputTimer=null;save();},300);
});

function doExport(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`progress-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
}
function handleImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data||typeof data!=='object'||!Array.isArray(data.pages)) throw new Error('형식이 올바르지 않습니다 (pages 배열 필요)');
      confirmDialog('현재 데이터를 덮어쓸까요?',async()=>{
        state=data;
        normalizeState();
        await save();
        render();
      });
    }catch(err){alert('파일 오류: '+err.message);}
  };
  r.readAsText(f);ev.target.value='';
}

// ============== INIT ==============
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
load().then(()=>{render();subscribe();});
</script>
