<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>홈페이지 제작 진도</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="제작 진도">
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f5f6f8;--panel:#fff;--border:#e5e7eb;--border-soft:#f3f4f6;
    --text:#111827;--text-muted:#6b7280;--text-light:#9ca3af;
    --primary:#4f46e5;--primary-soft:#eef2ff;--primary-hover:#4338ca;
    --success:#10b981;--success-soft:#d1fae5;
    --warning:#f59e0b;--warning-soft:#fef3c7;
    --danger:#ef4444;--danger-soft:#fee2e2;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.02);
    --shadow-lg:0 4px 12px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
    --r:12px;--r-sm:8px;--r-xs:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  button{cursor:pointer;border:none;background:none}
  input,select,textarea{border:1px solid var(--border);border-radius:var(--r-xs);padding:7px 10px;background:#fff;outline:none;transition:border-color .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--primary)}
  textarea{resize:vertical;min-height:60px;font-family:inherit}
  #app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:#fff;border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:24px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{flex:1;padding:32px;max-width:calc(100vw - 240px);overflow-x:hidden}
  .logo{font-weight:700;font-size:16px;letter-spacing:-.02em;padding:0 8px}
  .logo small{display:block;color:var(--text-muted);font-weight:500;font-size:12px;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:2px}
  .nav button{text-align:left;padding:10px 12px;border-radius:var(--r-xs);color:var(--text-muted);font-weight:500;display:flex;align-items:center;gap:10px;transition:all .12s}
  .nav button:hover{background:var(--border-soft);color:var(--text)}
  .nav button.active{background:var(--primary-soft);color:var(--primary)}
  .nav-icon{width:16px;height:16px;flex-shrink:0}
  .dday-box{background:var(--bg);border-radius:var(--r-sm);padding:12px 14px;font-size:12px}
  .dday-box .lbl{color:var(--text-muted);margin-bottom:2px}
  .dday-box .val{font-weight:700;font-size:15px;letter-spacing:-.02em}
  .dday-box+.dday-box{margin-top:8px}
  .live-shortcut{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r-xs);background:var(--primary-soft);color:var(--primary);font-weight:600;font-size:13px;text-decoration:none;transition:all .12s;border:1px solid transparent}
  .live-shortcut:hover{background:var(--primary);color:#fff}
  .live-shortcut .nav-icon{width:16px;height:16px;flex-shrink:0}
  .live-shortcut .ext{margin-left:auto;font-size:11px;opacity:.7}
  .live-shortcut.disabled{opacity:.5;pointer-events:none}
  .dday-num{color:var(--primary)}
  .dday-past{color:var(--danger)}
  .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
  .page-head h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .page-head .sub{color:var(--text-muted);margin-top:2px;font-size:13px}
  .btn{padding:8px 14px;border-radius:var(--r-xs);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;border:1px solid transparent}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-hover)}
  .btn-soft{background:var(--primary-soft);color:var(--primary)}
  .btn-soft:hover{background:#dbe2ff}
  .btn-ghost{background:transparent;color:var(--text-muted);border-color:var(--border)}
  .btn-ghost:hover{background:var(--border-soft);color:var(--text)}
  .btn-danger{background:transparent;color:var(--danger)}
  .btn-danger:hover{background:var(--danger-soft)}
  .btn-success{background:var(--success);color:#fff}
  .btn-success:hover{background:#059669}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-icon{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r-xs);color:var(--text-muted)}
  .btn-icon:hover{background:var(--border-soft);color:var(--text)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .card+.card{margin-top:16px}
  .grid{display:grid;gap:16px}
  .grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .grid-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .kpi{padding:18px}
  .kpi .lbl{color:var(--text-muted);font-size:12px;font-weight:500}
  .kpi .val{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:4px}
  .pbar{height:6px;background:var(--border-soft);border-radius:99px;overflow:hidden}
  .pbar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .3s}
  .pbar-fill.full{background:var(--success)}
  .donut{position:relative;width:160px;height:160px;margin:0 auto}
  .donut svg{transform:rotate(-90deg)}
  .donut-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut-text .pct{font-size:32px;font-weight:700;letter-spacing:-.03em}
  .donut-text .lbl{color:var(--text-muted);font-size:11px;margin-top:2px}
  .page-card{cursor:pointer;transition:all .15s}
  .page-card:hover{box-shadow:var(--shadow-lg);border-color:#d1d5db}
  .page-card-head{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:12px}
  .page-card-title{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .page-card-title.empty{color:var(--text-light);font-weight:500}
  .page-card-abbr{display:inline-block;background:var(--border-soft);color:var(--text-muted);font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;margin-top:4px;font-family:'SF Mono',Menlo,monospace}
  .page-card-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;font-size:12px;color:var(--text-muted)}
  .release-tag{background:#fef3c7;color:#92400e;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600}
  .release-tag.empty{background:var(--border-soft);color:var(--text-muted)}
  .flag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .flag-row{display:flex;flex-wrap:wrap;gap:4px}
  .flag-진행중{background:#dbeafe;color:#1e40af}
  .flag-제작중{background:#ede9fe;color:#5b21b6}
  .flag-수정중{background:#ffedd5;color:#9a3412}
  .flag-보류{background:#f3f4f6;color:#374151}
  .flag-검토{background:#fef9c3;color:#854d0e}
  .flag-이슈{background:var(--danger-soft);color:#991b1b}
  .ix-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
  .ix-status-doing{background:#fef3c7;color:#92400e}
  .ix-status-impl{background:#dbeafe;color:#1e40af}
  .ix-status-verified{background:#d1fae5;color:#065f46}
  .ix-status-empty{background:var(--border-soft);color:var(--text-muted)}
  .ix-status-select{font-size:12px;font-weight:600;padding:3px 24px 3px 10px;border-radius:99px;border:1px solid var(--border);cursor:pointer}
  .ix-status-select.ix-status-doing{border-color:#f59e0b}
  .ix-status-select.ix-status-impl{border-color:#3b82f6}
  .ix-status-select.ix-status-verified{border-color:#10b981}
  .ix-inline{display:inline-flex;align-items:center;gap:4px;color:var(--text-muted);margin-right:8px}
  .elem-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
  .elem-status-doing{background:#fef3c7;color:#92400e}
  .elem-status-pending{background:#ede9fe;color:#5b21b6}
  .elem-status-final{background:#d1fae5;color:#065f46}
  .elem-status-empty{background:var(--border-soft);color:var(--text-muted)}
  .elem-status-select{font-size:12px;font-weight:600;padding:3px 24px 3px 10px;border-radius:99px;border:1px solid var(--border);cursor:pointer}
  .elem-status-select.elem-status-doing{border-color:#f59e0b}
  .elem-status-select.elem-status-pending{border-color:#8b5cf6}
  .elem-status-select.elem-status-final{border-color:#10b981}
  .path-inline-input{font-size:11px;padding:4px 8px;width:100%;min-width:120px}
  .flag-picker{display:flex;flex-wrap:wrap;gap:6px}
  .flag-pill{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);color:var(--text-muted);background:#fff;cursor:pointer}
  .flag-pill.on{border-color:transparent}
  .back-btn{color:var(--text-muted);font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
  .back-btn:hover{color:var(--text)}
  .page-detail-head{display:flex;align-items:start;justify-content:space-between;gap:16px;margin-bottom:8px;flex-wrap:wrap}
  .page-name-input{font-size:22px;font-weight:700;letter-spacing:-.02em;border:none;padding:2px 4px;background:transparent;width:100%}
  .page-name-input:hover{background:var(--border-soft)}
  .meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 16px}
  .meta-row label{color:var(--text-muted);font-size:12px}
  .abbr-input{width:80px;font-family:'SF Mono',Menlo,monospace;font-size:12px;font-weight:600;text-transform:uppercase}
  .checks-row{display:flex;flex-wrap:wrap;gap:12px;padding:14px;background:var(--bg);border-radius:var(--r-sm);margin-bottom:16px;align-items:center}
  .checks-label{color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .check-item{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none;padding:4px 8px;border-radius:var(--r-xs);transition:background .1s}
  .check-item:hover{background:#fff}
  .check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary);padding:0}
  .section-card{border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:12px;overflow:hidden;background:#fff}
  .section-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
  .section-head:hover{background:#fafbfc}
  .section-toggle{color:var(--text-muted);transition:transform .2s;flex-shrink:0;font-size:10px}
  .section-toggle.open{transform:rotate(90deg)}
  .section-name{font-weight:600;flex:1;min-width:120px;font-size:14px}
  .section-name input{font-weight:600;border:none;padding:2px 4px;background:transparent;width:100%}
  .section-name input:hover{background:var(--border-soft)}
  .section-progress{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
  .section-progress .pbar{width:80px}
  .section-body{padding:16px;border-top:1px solid var(--border-soft);background:var(--bg);display:none}
  .section-body.open{display:block}
  .elem{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden}
  .elem-row{display:flex;align-items:center;gap:10px;padding:10px 12px;flex-wrap:wrap}
  .elem-id{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text-muted);background:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0;font-weight:600}
  .elem-type-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600;flex-shrink:0}
  .elem-type-text{background:#e0f2fe;color:#075985}
  .elem-type-image{background:#fce7f3;color:#9d174d}
  .elem-type-object{background:#f3e8ff;color:#6b21a8}
  .elem-label{flex:1;min-width:120px;border:none;padding:4px 6px;background:transparent}
  .elem-label:hover{background:var(--border-soft);border-radius:4px}
  .elem-actions{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .ix-toggle-btn{font-size:11px;padding:3px 8px;border-radius:var(--r-xs);background:var(--border-soft);color:var(--text-muted);font-weight:600;transition:all .1s}
  .ix-toggle-btn.active{background:#fef3c7;color:#92400e}
  .ix-toggle-btn.done{background:var(--success-soft);color:#065f46}
  .ix-toggle-btn:hover{background:#e5e7eb}
  .asset-row{padding:0 12px 10px;display:flex;align-items:center;gap:6px}
  .asset-row label{font-size:11px;color:var(--text-muted);font-weight:600;flex-shrink:0}
  .asset-row input{flex:1;font-size:12px;padding:5px 8px}
  .asset-row a{font-size:11px;color:var(--primary);text-decoration:none;font-weight:600;flex-shrink:0;padding:5px 8px}
  .effect-row{padding:10px 14px;display:flex;align-items:center;gap:8px;background:var(--primary-soft);border-bottom:1px solid var(--border-soft)}
  .effect-row label{font-size:14px;flex-shrink:0}
  .effect-row input{flex:1;background:#fff}
  .ix-panel{padding:14px;border-top:1px solid var(--border-soft);background:#fafbfc;display:none}
  .ix-panel.open{display:block}
  .ix-panel-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .ix-list{border-top:1px solid var(--border-soft)}
  .ix-list .ix-panel+.ix-panel{border-top:1px solid var(--border)}
  .ix-add-row{padding:10px;text-align:center;background:#fafbfc;border-top:1px dashed var(--border)}
  .ix-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .ix-field label{display:block;font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .ix-field input,.ix-field select,.ix-field textarea{width:100%;font-size:13px}
  .ix-field-full{grid-column:1/-1}
  .ix-field-check{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 0}
  .ix-field-check input{width:16px;height:16px;accent-color:var(--primary);padding:0;margin:0}
  .ix-section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;grid-column:1/-1;padding-top:10px;border-top:1px dashed var(--border)}
  .ix-section-title:first-child{margin-top:0;padding-top:0;border-top:none}
  .ix-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border-soft)}
  .ix-summary-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:13px;align-items:start}
  .ix-summary-grid dt{color:var(--text-muted);font-weight:500;font-size:12px}
  .ix-summary-grid dd{font-weight:500;word-break:break-word}
  .ix-summary-grid dd a{color:var(--primary);text-decoration:none}
  .ix-summary-section{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;padding-top:6px;border-top:1px dashed var(--border)}
  .ix-summary-section:first-child{margin-top:0;padding-top:0;border-top:none}
  .ix-summary-row{display:flex;flex-wrap:wrap;gap:6px 22px;margin:6px 0 4px}
  .ix-pair{display:flex;flex-direction:column;gap:2px;min-width:50px}
  .ix-pair dt{color:var(--text-muted);font-weight:500;font-size:11px;letter-spacing:.02em}
  .ix-pair dd{font-weight:600;font-size:13px;word-break:break-word}
  .ix-pair dd a{color:var(--primary);text-decoration:none}
  .ix-pair-block{margin-top:4px;display:flex;gap:10px;font-size:13px}
  .ix-pair-block dt{color:var(--text-muted);font-weight:500;font-size:12px;flex-shrink:0;min-width:36px}
  .ix-pair-block dd{font-weight:500;word-break:break-word;flex:1}
  .ix-pair-block dd a{color:var(--primary);text-decoration:none}
  .ix-summary-section.ix-actual-title{color:var(--primary);border-top-color:var(--primary)}
  .ix-actual-block{grid-column:1/-1;white-space:pre-wrap;background:var(--primary-soft);color:var(--text);padding:10px 12px;border-radius:var(--r-xs);font-size:12.5px;line-height:1.55;font-family:'SF Mono',Menlo,monospace;max-height:280px;overflow-y:auto}
  .ix-actual-textarea{font-family:'SF Mono',Menlo,monospace;font-size:12.5px;line-height:1.5;background:var(--primary-soft);min-height:120px}
  .add-elem-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .add-elem-row .btn{font-size:12px;padding:6px 10px}
  .table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--r);overflow:hidden}
  .table th,.table td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--border-soft);font-size:13px}
  .table th{background:var(--bg);font-weight:600;font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em}
  .table tr:last-child td{border-bottom:none}
  .table tr.clickable{cursor:pointer}
  .table tr.clickable:hover{background:#fafbfc}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-bar select,.filter-bar input{font-size:13px;padding:6px 10px}
  .ov-page{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)}
  .ov-page-head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#fafbfc}
  .ov-page-name{font-weight:700;font-size:15px;letter-spacing:-.01em;cursor:pointer;color:var(--text);text-decoration:none}
  .ov-page-name:hover{color:var(--primary)}
  .ov-page-name.empty{color:var(--text-light);font-weight:500}
  .ov-page-meta{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:160px}
  .ov-empty-row{padding:18px;color:var(--text-muted);font-size:13px;text-align:center}
  .ov-empty-row a{color:var(--primary);text-decoration:none;font-weight:600;cursor:pointer}
  .ov-sec{border-top:1px solid var(--border-soft)}
  .ov-sec:first-child{border-top:none}
  .ov-sec-head{padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fcfcfd;border-bottom:1px solid var(--border-soft)}
  .ov-sec-title{display:flex;align-items:center;gap:6px;min-width:160px;flex-shrink:0;flex-wrap:wrap}
  .ov-section-name{font-weight:600;color:var(--text);text-decoration:none;cursor:pointer;font-size:14px}
  .ov-section-name:hover{color:var(--primary)}
  .ov-section-name.empty{color:var(--text-light);font-weight:500}
  .ov-abbr{display:inline-block;background:var(--border-soft);color:var(--text-muted);font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;font-family:'SF Mono',Menlo,monospace}
  .ov-sec-stages{display:flex;gap:4px;flex-wrap:wrap}
  .ov-stage-chk{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted);cursor:pointer;padding:3px 8px;border-radius:99px;background:#fff;border:1px solid var(--border);user-select:none;white-space:nowrap;transition:all .12s}
  .ov-stage-chk:hover{border-color:var(--text-muted)}
  .ov-stage-chk.on{background:var(--primary-soft);color:var(--primary);border-color:transparent;font-weight:600}
  .ov-stage-chk input{width:0;height:0;opacity:0;position:absolute;pointer-events:none}
  .ov-sec-pct{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .ov-sec-pct .pbar{width:64px}
  .ov-sec-flags{flex-shrink:0}
  .ov-sec-flags .flag-picker{gap:3px}
  .ov-sec-flags .flag-pill{font-size:10px;padding:2px 7px}
  .ov-sec-spacer{flex:1;min-width:8px}
  .ov-sec-empty{padding:14px 18px;color:var(--text-muted);font-size:12px;font-style:italic;background:#fff}

// ============== CONSTANTS ==============
const FLAGS = ['진행중','제작중','수정중','보류','검토 대기','이슈'];
const FLAG_DEFS = {'진행중':'지금 작업 중인 항목','제작중':'디자인/콘텐츠 제작 중','수정중':'배포 후 재작업 중','보류':'우선순위 밀려 멈춤','검토 대기':'컨펌/리뷰 대기','이슈':'문제 발생, 해결 필요'};

const PAGE_TASKS = ['기획','디자인','코딩','콘텐츠 입력','점검','런칭'];
const SECTION_STAGES = ['기획','카피','레이아웃','코딩','점검','발행대기'];
const DEFAULT_RELEASES = ['가오픈','정식'];
const TRIGGERS = ['스크롤 진입','자동 (페이지 로드)','클릭','호버','시간 경과','비디오 종료','커스텀'];
const ACTIONS = ['페이드인','페이드아웃','슬라이드인','슬라이드아웃','스케일','회전','패럴랙스','모핑','비디오 재생','모달 오픈','네비게이션','커스텀'];
const EASINGS = ['ease','ease-in','ease-out','ease-in-out','linear','spring','bounce','커스텀'];
const DEVICES = ['둘다','PC만','모바일만'];
const IX_STATUSES = ['구현중','구현 완료','점검완료'];
const IX_STATUS_CLS = {'구현중':'ix-status-doing','구현 완료':'ix-status-impl','점검완료':'ix-status-verified'};
const IX_STATUS_DONE = new Set(['구현 완료','점검완료']);
function ixIsDone(ix){return IX_STATUS_DONE.has(ix.status);}
const PRIORITIES = ['높음','보통','낮음'];
const PRIORITY_CLS = {'높음':'priority-높음','보통':'priority-보통','낮음':'priority-낮음'};
const PRIORITY_ORDER = {'높음':0,'보통':1,'낮음':2};
const DEFAULT_PRIORITY = '보통';
const ELEM_STATUSES = ['제작중','미확정','확정'];
const ELEM_STATUS_CLS = {'제작중':'elem-status-doing','미확정':'elem-status-pending','확정':'elem-status-final'};
const ELEM_STATUS_DONE = new Set(['확정']);
function elemIsDone(e){return ELEM_STATUS_DONE.has(e.status);}
const ACTION_FIELDS = {
  '페이드인':[{key:'startOpacity',label:'시작 투명도',type:'number',placeholder:'0',step:'0.05'},{key:'endOpacity',label:'끝 투명도',type:'number',placeholder:'1',step:'0.05'}],
  '페이드아웃':[{key:'startOpacity',label:'시작 투명도',type:'number',placeholder:'1',step:'0.05'},{key:'endOpacity',label:'끝 투명도',type:'number',placeholder:'0',step:'0.05'}],
  '슬라이드인':[{key:'direction',label:'방향',type:'select',options:['아래에서','위에서','왼쪽에서','오른쪽에서']},{key:'distance',label:'거리 (px)',type:'number',placeholder:'40'},{key:'withFade',label:'페이드 함께',type:'checkbox'}],
  '슬라이드아웃':[{key:'direction',label:'방향',type:'select',options:['아래로','위로','왼쪽으로','오른쪽으로']},{key:'distance',label:'거리 (px)',type:'number',placeholder:'40'},{key:'withFade',label:'페이드 함께',type:'checkbox'}],
  '스케일':[{key:'startScale',label:'시작 배율',type:'number',placeholder:'0.8',step:'0.05'},{key:'endScale',label:'끝 배율',type:'number',placeholder:'1',step:'0.05'},{key:'origin',label:'기준점',type:'select',options:['중앙','왼쪽 위','오른쪽 위','왼쪽 아래','오른쪽 아래']}],
  '회전':[{key:'startRotate',label:'시작 각도',type:'number',placeholder:'0'},{key:'endRotate',label:'끝 각도',type:'number',placeholder:'360'},{key:'origin',label:'회전 축',type:'select',options:['중앙','왼쪽 위','오른쪽 위']},{key:'continuous',label:'무한 반복',type:'checkbox'}],
  '패럴랙스':[{key:'speed',label:'속도 (배수)',type:'number',placeholder:'0.5',step:'0.1'},{key:'direction',label:'방향',type:'select',options:['세로','가로']},{key:'range',label:'범위 (px)',type:'number',placeholder:'100'}],
  '모핑':[{key:'startShape',label:'시작 형태',type:'text',placeholder:'예: 원형'},{key:'endShape',label:'끝 형태',type:'text',placeholder:'예: 사각형'},{key:'morphProps',label:'변하는 속성',type:'text',placeholder:'border-radius...'}],
  '비디오 재생':[{key:'autoplay',label:'자동재생',type:'checkbox'},{key:'loop',label:'반복재생',type:'checkbox'},{key:'muted',label:'음소거',type:'checkbox'},{key:'controls',label:'컨트롤 표시',type:'checkbox'},{key:'startAt',label:'시작 시점 (s)',type:'number',placeholder:'0'}],
  '모달 오픈':[{key:'targetModal',label:'대상 모달',type:'text',placeholder:'모달 ID'},{key:'closeBg',label:'배경 클릭으로 닫기',type:'checkbox'},{key:'closeEsc',label:'ESC로 닫기',type:'checkbox'},{key:'closeBtn',label:'X 버튼',type:'checkbox'},{key:'overlay',label:'배경 어둡게',type:'checkbox'}],
  '네비게이션':[{key:'target',label:'대상 URL/앵커',type:'text',placeholder:'#about 또는 https://...'},{key:'newWindow',label:'새 창',type:'checkbox'},{key:'smooth',label:'부드러운 스크롤',type:'checkbox'}],
  '커스텀':[{key:'customDesc',label:'동작 설명',type:'textarea',placeholder:'동작을 자세히 설명해주세요'}]
};

// ============== STATE ==============
let state = {meta:{stages:[...DEFAULT_RELEASES],dates:{}},pages:[]};
let view='dashboard', selPage=null;
let openSections=new Set(), openIxPanels=new Set(), editingIx=new Set();

async function load(){
  try{
    const snap = await db.ref(DB_REF).once('value');
    if(snap.val()) state = snap.val();
  }catch(e){console.error('Load failed',e);}
  if(!state.pages) state.pages=[];
  if(!state.meta) state.meta={};
  if(!state.meta.stages) state.meta.stages=[...DEFAULT_RELEASES];
  if(!state.meta.dates) state.meta.dates={};
  if(state.meta.가오픈일){if(!state.meta.dates['가오픈'])state.meta.dates['가오픈']=state.meta.가오픈일;delete state.meta.가오픈일;}
  if(state.meta.정식오픈일){if(!state.meta.dates['정식'])state.meta.dates['정식']=state.meta.정식오픈일;delete state.meta.정식오픈일;}
  state.pages.forEach(p=>{
    if(!p.checks) p.checks={};
    PAGE_TASKS.forEach(k=>{if(p.checks[k]===undefined)p.checks[k]=false;});
    if(!p.flags) p.flags=[];
    if(!p.priority||!PRIORITY_ORDER.hasOwnProperty(p.priority)) p.priority=DEFAULT_PRIORITY;
    if(!p.sections) p.sections=[];
    p.sections.forEach(s=>{
      if(!s.stages) s.stages={};
      SECTION_STAGES.forEach(k=>{if(s.stages[k]===undefined)s.stages[k]=(s.checks&&s.checks[k])||false;});
      if(!s.flags) s.flags=[];
      if(!s.elements) s.elements=[];
      s.elements.forEach(e=>{
        if(e.type==='etc') e.type='object';
        if(e.assetPath===undefined) e.assetPath='';
        if(e.status===undefined) e.status=e.done?'확정':'';
        delete e.done;
        if(!e.ixs){
          e.ixs = (e.ix && (e.ix.on||e.ix.action)) ? [{...e.ix,id:e.ix.id||uid()}] : [];
        }
        delete e.ix;
        e.ixs.forEach(ix=>{
          if(!ix.id)ix.id=uid();
          if(!ix.params)ix.params={};
          delete ix.on;
          if(ix.status===undefined) ix.status=ix.done?'구현 완료':'';
          delete ix.done;
        });
      });
    });
  });
  if(!state.meta._timingDefaultsCleared){
    state.pages.forEach(p=>(p.sections||[]).forEach(s=>(s.elements||[]).forEach(e=>(e.ixs||[]).forEach(ix=>{
      if(String(ix.duration)==='0.6'&&String(ix.delay)==='0'&&ix.easing==='ease-out'){
        ix.duration='';ix.delay='';ix.easing='';
      }
    }))));
    state.meta._timingDefaultsCleared=true;
    save();
  }
}
async function save(){
  try{await db.ref(DB_REF).set(state);}
  catch(e){console.error('Save failed',e);}
}
function uid(){return Math.random().toString(36).slice(2,10);}
function clonePage(p){
  const np=JSON.parse(JSON.stringify(p));
  np.id=uid();
  np.name=(p.name||'')+' (복사본)';
  (np.sections||[]).forEach(s=>{
    s.id=uid();
    (s.elements||[]).forEach(e=>{
      e.id=uid();
      (e.ixs||[]).forEach(ix=>{ix.id=uid();});
    });
  });
  return np;
}
function cloneSection(s){
  const ns=JSON.parse(JSON.stringify(s));
  ns.id=uid();
  ns.name=(s.name||'')+' (복사본)';
  (ns.elements||[]).forEach(e=>{
    e.id=uid();
    (e.ixs||[]).forEach(ix=>{ix.id=uid();});
  });
  return ns;
}
function priOrder(p){return PRIORITY_ORDER[p.priority||DEFAULT_PRIORITY];}
function pageStageGroups(){
  const stages=[...(state.meta.stages||[]),'(미지정)'];
  const groups={};
  stages.forEach(st=>groups[st]=[]);
  state.pages.forEach((p,idx)=>{
    const r=p.release||'(미지정)';
    if(!groups[r])groups[r]=[];
    groups[r].push({page:p,idx});
  });
  return{stages,groups};
}
function movePageInStage(pid,dir){
  const p=findPage(pid);if(!p)return false;
  const release=p.release||'';
  const sameIdx=[];
  state.pages.forEach((pg,i)=>{if((pg.release||'')===release)sameIdx.push(i);});
  const myArrIdx=state.pages.indexOf(p);
  const pos=sameIdx.indexOf(myArrIdx);
  const np=dir==='up'?pos-1:pos+1;
  if(np<0||np>=sameIdx.length)return false;
  const i=sameIdx[pos],j=sameIdx[np];
  [state.pages[i],state.pages[j]]=[state.pages[j],state.pages[i]];
  return true;
}

// ============== CALC ==============
function isAsset(e){return e.type==='image'||e.type==='object';}
function calcSection(s){
  let total=0,done=0;
  if(s.stages) Object.values(s.stages).forEach(v=>{total++;if(v)done++;});
  (s.elements||[]).forEach(e=>{
    total++;if(elemIsDone(e))done++;
    (e.ixs||[]).forEach(ix=>{total++;if(ixIsDone(ix))done++;});
  });
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function calcPage(p){
  let total=0,done=0;
  if(p.checks) Object.values(p.checks).forEach(v=>{total++;if(v)done++;});
  (p.sections||[]).forEach(s=>{const c=calcSection(s);total+=c.total;done+=c.done;});
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function calcAll(){
  let total=0,done=0;
  state.pages.forEach(p=>{const c=calcPage(p);total+=c.total;done+=c.done;});
  return{total,done,pct:total?Math.round(done/total*100):0};
}
function genId(p,s,idx){
  return `${(p.abbr||'?').toUpperCase()}-${(s.abbr||'?').toUpperCase()}-${String(idx+1).padStart(3,'0')}`;
}
function assetIdx(s,eid){let i=0;for(const e of(s.elements||[])){if(isAsset(e)){if(e.id===eid)return i;i++;}}return -1;}
function imageIdx(s,eid){let i=0;for(const e of(s.elements||[])){if(e.type==='image'){if(e.id===eid)return i;i++;}}return -1;}
function objectIdx(s,eid){let i=0;for(const e of(s.elements||[])){if(e.type==='object'){if(e.id===eid)return i;i++;}}return -1;}
function textIdx(s,eid){let i=0;for(const e of(s.elements||[])){if(e.type==='text'){if(e.id===eid)return i;i++;}}return -1;}
function elemDisplayId(p,s,e){
  if(e.type==='image')return genId(p,s,imageIdx(s,e.id));
  if(e.type==='object')return `오브젝트 ${objectIdx(s,e.id)+1}`;
  if(e.type==='text')return `유닛 ${textIdx(s,e.id)+1}`;
  return '';
}
function ddayText(d){
  if(!d) return null;
  const today=new Date();today.setHours(0,0,0,0);
  const t=new Date(d);t.setHours(0,0,0,0);
  const diff=Math.round((t-today)/86400000);
  if(diff===0)return{text:'D-DAY',past:false};
  if(diff>0)return{text:`D-${diff}`,past:false};
  return{text:`D+${-diff}`,past:true};
}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderDDay(){
  const dates=state.meta.dates||{};

  (state.meta.stages||[]).forEach(st=>{

    if(d) h+=`<div class="dday-box"><div class="lbl">${esc(st)}</div><div class="val ${d.past?'dday-past':'dday-num'}">${d.text}</div></div>`;
  });

  return h;
}

function donut(pct){
  const r=58,c=2*Math.PI*r,off=c-(pct/100)*c;
  return`<div class="donut"><svg width="160" height="160"><circle cx="80" cy="80" r="${r}" stroke="#eef0f3" stroke-width="14" fill="none"/><circle cx="80" cy="80" r="${r}" stroke="${pct===100?'#10b981':'#4f46e5'}" stroke-width="14" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/></svg><div class="donut-text"><div class="pct">${pct}%</div><div class="lbl">전체 진행률</div></div></div>`;
}

function renderIxList(p,s,e){

function renderIxCard(p,s,e,ix,i){

  let h=`<div class="ix-panel open"><div class="ix-panel-header"><span style="font-weight:600">⚡ 인터랙션 ${i+1}${ix.action?` · ${esc(ix.action)}`:''}</span><div style="margin-left:auto;display:flex;gap:6px;align-items:center">${editing?'':statusSel}${!editing?`<button class="btn btn-ghost btn-sm" data-act="ix-edit" data-iid="${ix.id}">수정</button>`:''}<button class="btn btn-danger btn-sm" data-act="ix-delete" data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-iid="${ix.id}">삭제</button></div></div>`;

function renderIxForm(p,s,e,ix){
  const params=ix.params||{},action=ix.action||ACTIONS[0],aFields=ACTION_FIELDS[action]||[];
  const D=`data-pid="${p.id}" data-sid="${s.id}" data-eid="${e.id}" data-iid="${ix.id}"`;
  let h=`<div class="ix-grid">
    <div class="ix-section-title">기본</div>
    <div class="ix-field"><label>트리거</label><select data-act="set-ix" ${D} data-key="trigger">${TRIGGERS.map(t=>`<option ${ix.trigger===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-field"><label>동작</label><select data-act="set-ix" ${D} data-key="action">${ACTIONS.map(t=>`<option ${ix.action===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-field"><label>디바이스</label><select data-act="set-ix" ${D} data-key="device">${DEVICES.map(t=>`<option ${ix.device===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="ix-section-title">타이밍</div>
    <div class="ix-field"><label>지속시간 (초)</label><input type="number" step="0.05" min="0" data-act="set-ix" ${D} data-key="duration" value="${esc(ix.duration||'')}" placeholder="0.6"/></div>
    <div class="ix-field"><label>지연 (초)</label><input type="number" step="0.05" min="0" data-act="set-ix" ${D} data-key="delay" value="${esc(ix.delay||'')}" placeholder="0"/></div>
    <div class="ix-field"><label>이징</label><select data-act="set-ix" ${D} data-key="easing"><option value="" ${!ix.easing?'selected':''}>선택 안 함</option>${EASINGS.map(t=>`<option ${ix.easing===t?'selected':''}>${t}</option>`).join('')}</select></div>`;
  if(aFields.length){
    h+=`<div class="ix-section-title">${esc(action)} 설정</div>`;
    aFields.forEach(f=>{
      const val=params[f.key];
      if(f.type==='checkbox') h+=`<div class="ix-field-check"><input type="checkbox" data-act="set-ix-param" ${D} data-key="${f.key}" ${val?'checked':''}/><label style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)">${esc(f.label)}</label></div>`;
      else if(f.type==='select') h+=`<div class="ix-field"><label>${esc(f.label)}</label><select data-act="set-ix-param" ${D} data-key="${f.key}"><option value="">선택</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
      else if(f.type==='textarea') h+=`<div class="ix-field ix-field-full"><label>${esc(f.label)}</label><textarea data-act="set-ix-param" ${D} data-key="${f.key}" placeholder="${esc(f.placeholder||'')}">${esc(val||'')}</textarea></div>`;
      else h+=`<div class="ix-field"><label>${esc(f.label)}</label><input type="${f.type||'text'}" ${f.step?`step="${f.step}"`:''} data-act="set-ix-param" ${D} data-key="${f.key}" value="${esc(val||'')}" placeholder="${esc(f.placeholder||'')}"/></div>`;
    });
  }
  h+=`<div class="ix-section-title">🔵 실제 적용 (Live)</div>
    <div class="ix-field ix-field-full"><label>사이트에 실제 적용된 인터랙션</label><textarea class="ix-actual-textarea" rows="6" data-act="set-ix" ${D} data-key="actual" placeholder="Claude에게 'home/section1 인터랙션 정리해줘' 같이 요청해서 받은 내용을 붙여넣으세요. 비워두면 표시 안 됨.">${esc(ix.actual||'')}</textarea></div>
    <div class="ix-section-title">참고</div>
    <div class="ix-field ix-field-full"><label>참고 링크</label><input data-act="set-ix" ${D} data-key="link" value="${esc(ix.link||'')}" placeholder="https://..."/></div>
    <div class="ix-field ix-field-full"><label>메모</label><textarea data-act="set-ix" ${D} data-key="memo" placeholder="상세 설명">${esc(ix.memo||'')}</textarea></div>
  </div>
  <div class="ix-actions"><button class="btn btn-success" data-act="ix-register" data-iid="${ix.id}">✓ 등록</button></div>`;
  return h;
}

function renderIxSummary(ix){
  const params=ix.params||{},action=ix.action||'',aFields=ACTION_FIELDS[action]||[];
  const pair=(k,v)=>`<div class="ix-pair"><dt>${k}</dt><dd>${v}</dd></div>`;
  const row=(title,pairs)=>pairs.length?`<div class="ix-summary-section">${title}</div><div class="ix-summary-row">${pairs.join('')}</div>`:'';
  const basic=[];
  if(ix.trigger) basic.push(pair('트리거',esc(ix.trigger)));
  if(ix.action) basic.push(pair('동작',`<strong>${esc(ix.action)}</strong>`));
  if(ix.device) basic.push(pair('디바이스',esc(ix.device)));
  const timing=[];
  if(ix.duration) timing.push(pair('지속',`${esc(ix.duration)}s`));
  if(ix.delay) timing.push(pair('지연',`${esc(ix.delay)}s`));
  if(ix.easing) timing.push(pair('이징',esc(ix.easing)));
  const filled=aFields.filter(f=>{const v=params[f.key];return f.type==='checkbox'?!!v:v!==undefined&&v!==''&&v!==null;});
  const actionPairs=filled.map(f=>{const v=params[f.key];return pair(esc(f.label),f.type==='checkbox'?'✓':esc(String(v)));});
  let h=`<div class="ix-summary">`;
  h+=row('기본',basic);
  h+=row('타이밍',timing);
  h+=row(esc(action),actionPairs);
  if(ix.actual){
    h+=`<div class="ix-summary-section ix-actual-title">🔵 실제 적용 (Live)</div><div class="ix-actual-block">${esc(ix.actual)}</div>`;
  }
  if(ix.link||ix.memo){
    h+=`<div class="ix-summary-section">참고</div>`;
    if(ix.link) h+=`<div class="ix-pair-block"><dt>링크</dt><dd><a href="${esc(ix.link)}" target="_blank">${esc(ix.link)} ↗</a></dd></div>`;
    if(ix.memo) h+=`<div class="ix-pair-block"><dt>메모</dt><dd style="white-space:pre-wrap">${esc(ix.memo)}</dd></div>`;
  }
  return h+`</div>`;
}

function ovIxLine(ix){
  const params=ix.params||{};
  const aFields=ACTION_FIELDS[ix.action]||[];
  const filled=aFields.filter(f=>{const v=params[f.key];return f.type==='checkbox'?!!v:v!==undefined&&v!==''&&v!==null;});
  const head=[];
  if(ix.trigger) head.push(esc(ix.trigger));
  if(ix.action) head.push(`<strong>${esc(ix.action)}</strong>`);
  let line=head.join(' <span class="muted">→</span> ')||'<span class="muted">(설정 없음)</span>';
  const meta=[];
  if(ix.duration) meta.push(`${esc(ix.duration)}s`);
  if(ix.delay&&String(ix.delay)!=='0') meta.push(`지연 ${esc(ix.delay)}s`);
  if(ix.device&&ix.device!=='둘다') meta.push(esc(ix.device));
  filled.slice(0,4).forEach(f=>{
    const v=params[f.key];
    meta.push(`${esc(f.label)} ${f.type==='checkbox'?'✓':esc(String(v))}`);
  });
  if(meta.length) line+=` <span class="muted">· ${meta.join(' · ')}</span>`;
  if(ix.memo){
    const m=ix.memo.replace(/\s+/g,' ').trim();
    if(m) line+=` <span class="muted">· 📝 ${esc(m.slice(0,40))}${m.length>40?'…':''}</span>`;
  }
  return line;
}

      <td>${esc(it.elem.label||'(설명 없음)')}</td>

      <td class="small">${(it.elem.ixs||[]).length?(it.elem.ixs||[]).map(ix=>`<span class="ix-inline">⚡${esc(ix.action||'')}${ix.status?` <span class="ix-status ${IX_STATUS_CLS[ix.status]}">${ix.status}</span>`:''}</span>`).join(' '):'<span class="muted">—</span>'}</td>
      <td><select class="elem-status-select ${it.elem.status?ELEM_STATUS_CLS[it.elem.status]:'elem-status-empty'}" data-act="set-elem-status" data-pid="${it.page.id}" data-sid="${it.section.id}" data-eid="${it.elem.id}"><option value="" ${!it.elem.status?'selected':''}>미정</option>${ELEM_STATUSES.map(st=>`<option value="${st}" ${it.elem.status===st?'selected':''}>${st}</option>`).join('')}</select></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  return h;
}

function renderInteractions(){
  const items=[];
  state.pages.forEach(p=>(p.sections||[]).forEach(s=>(s.elements||[]).forEach(e=>{(e.ixs||[]).forEach(ix=>{const id=isAsset(e)?elemDisplayId(p,s,e):'';items.push({page:p,section:s,elem:e,ix,id});});})));
  let h=`<div class="page-head"><div><h2>인터랙션 모아보기</h2><div class="sub">${items.length}개</div></div></div>`;
  if(!items.length) return h+`<div class="card empty"><div class="empty-icon">⚡</div><div class="empty-msg">인터랙션이 없어요.</div></div>`;
  h+=`<div class="filter-bar">
    <select id="ix-filter-status"><option value="all">전체</option><option value="">미정</option>${IX_STATUSES.map(st=>`<option value="${st}">${st}</option>`).join('')}</select>
    <select id="ix-filter-trigger"><option value="all">전체 트리거</option>${TRIGGERS.map(t=>`<option>${t}</option>`).join('')}</select>
    <select id="ix-filter-action"><option value="all">전체 동작</option>${ACTIONS.map(t=>`<option>${t}</option>`).join('')}</select>
    <input id="ix-filter-search" placeholder="검색..." style="flex:1;min-width:160px"/>
  </div><div class="grid grid-3" id="ix-grid">`;
  items.forEach(it=>{
    const ix=it.ix,params=ix.params||{},aFields=ACTION_FIELDS[ix.action]||[];
    const filled=aFields.filter(f=>{const v=params[f.key];return f.type==='checkbox'?!!v:v!==undefined&&v!==''&&v!==null;});
    const stCls=ix.status?IX_STATUS_CLS[ix.status]:'ix-status-empty';
    const eStCls=it.elem.status?ELEM_STATUS_CLS[it.elem.status]:'elem-status-empty';
    const descParts=[];
    if(it.elem.label)descParts.push(esc(it.elem.label));
    if(it.elem.effect)descParts.push(`<span class="muted">✨</span> ${esc(it.elem.effect)}`);
    if(ix.memo)descParts.push(`<span class="muted">📝</span> ${esc(ix.memo).replace(/\n/g,' ')}`);
    const descLine=descParts.length?descParts.join(' <span class="muted">/</span> '):'(설명 없음)';
    h+=`<div class="ix-card" data-page="${it.page.id}" data-section="${it.section.id}" data-status="${esc(ix.status||'')}" data-trigger="${esc(ix.trigger||'')}" data-action="${esc(ix.action||'')}" data-search="${esc((it.elem.label+' '+(ix.memo||'')+' '+(it.elem.effect||'')).toLowerCase())}">
      <div class="ix-card-head"><div style="flex:1;min-width:0"><div class="ix-card-loc">${esc(it.page.name)} › ${esc(it.section.name)}</div><div class="ix-card-label">${it.id?`<span class="elem-id" style="margin-right:6px">${it.id}</span>`:''}${descLine}</div></div><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span class="elem-status ${eStCls}" title="유닛 상태">${it.elem.status||'미정'}</span><select class="ix-status-select ${stCls}" data-act="set-ix-status" data-pid="${it.page.id}" data-sid="${it.section.id}" data-eid="${it.elem.id}" data-iid="${ix.id}"><option value="" ${!ix.status?'selected':''}>상태 미정</option>${IX_STATUSES.map(st=>`<option value="${st}" ${ix.status===st?'selected':''}>${st}</option>`).join('')}</select><button class="btn btn-ghost btn-sm" data-act="goto-ix" data-page="${it.page.id}" data-section="${it.section.id}" data-eid="${it.elem.id}" data-iid="${ix.id}">편집</button></div></div>
      <dl class="ix-summary-grid">
        ${ix.trigger?`<dt>트리거</dt><dd>${esc(ix.trigger)}</dd>`:''}
        ${ix.action?`<dt>동작</dt><dd><strong>${esc(ix.action)}</strong></dd>`:''}
        ${ix.duration?`<dt>지속</dt><dd>${esc(ix.duration)}s${ix.delay?` · 지연 ${esc(ix.delay)}s`:''}</dd>`:''}
        ${ix.device?`<dt>디바이스</dt><dd>${esc(ix.device)}</dd>`:''}
        ${filled.map(f=>`<dt>${esc(f.label)}</dt><dd>${f.type==='checkbox'?'✓':esc(String(params[f.key]))}</dd>`).join('')}
      </dl>
      ${ix.link?`<a class="ix-card-link" href="${esc(ix.link)}" target="_blank">참고 링크 ↗</a>`:''}
      ${ix.memo?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);font-size:12px;color:var(--text-muted);white-space:pre-wrap">${esc(ix.memo)}</div>`:''}
    </div>`;
  });
  return h+`</div>`;
}

// ============== EVENTS ==============
function bindEvents(){
  ['img-filter-status','img-filter-type','img-filter-page','img-filter-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',applyAssetFilters);});
  ['ix-filter-status','ix-filter-trigger','ix-filter-action','ix-filter-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',applyIxFilters);});
  ['ov-filter-page','ov-filter-progress','ov-filter-flag','ov-filter-search'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',applyOverviewFilters);});
  const imp=document.getElementById('import-file');if(imp)imp.addEventListener('change',handleImport);
}
function applyAssetFilters(){
  const st=document.getElementById('img-filter-status').value,tp=document.getElementById('img-filter-type').value,pg=document.getElementById('img-filter-page').value,sr=(document.getElementById('img-filter-search').value||'').toLowerCase();
  document.querySelectorAll('#img-table tbody tr').forEach(tr=>{
    let show=true;
    if(st!=='all'&&tr.dataset.status!==st)show=false;
    if(tp!=='all'&&tr.dataset.type!==tp)show=false;
    if(pg!=='all'&&tr.dataset.page!==pg)show=false;
    if(sr&&!tr.dataset.search.includes(sr))show=false;
    tr.style.display=show?'':'none';
  });
}
function applyOverviewFilters(){
  const pg=document.getElementById('ov-filter-page').value;
  const pr=document.getElementById('ov-filter-progress').value;
  const fl=document.getElementById('ov-filter-flag').value;
  const sr=(document.getElementById('ov-filter-search').value||'').toLowerCase();
  document.querySelectorAll('#ov-list>.ov-page').forEach(box=>{
    const pid=box.dataset.pid;
    if(pg!=='all'&&pid!==pg){box.style.display='none';return;}
    const secs=box.querySelectorAll(':scope>.ov-sec');
    let any=false;
    secs.forEach(sec=>{
      let show=true;
      if(pr==='complete'&&sec.dataset.complete!=='1')show=false;
      if(pr==='incomplete'&&sec.dataset.complete==='1')show=false;
      if(fl!=='all'){const fs=(sec.dataset.flags||'').split('|').filter(Boolean);if(!fs.includes(fl))show=false;}
      if(sr&&!sec.dataset.search.includes(sr))show=false;
      sec.style.display=show?'':'none';
      if(show)any=true;
    });
    box.style.display=(secs.length>0&&!any)?'none':'';
  });
}
function applyIxFilters(){
  const st=document.getElementById('ix-filter-status').value,tr=document.getElementById('ix-filter-trigger').value,ac=document.getElementById('ix-filter-action').value,sr=(document.getElementById('ix-filter-search').value||'').toLowerCase();
  document.querySelectorAll('#ix-grid>.ix-card').forEach(c=>{
    let show=true;
    if(st!=='all'&&c.dataset.status!==st)show=false;
    if(tr!=='all'&&c.dataset.trigger!==tr)show=false;
    if(ac!=='all'&&c.dataset.action!==ac)show=false;
    if(sr&&!c.dataset.search.includes(sr))show=false;
    c.style.display=show?'':'none';
  });
}
function confirmDialog(msg,onOk){
  const m=document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent=msg;
  m.classList.remove('hidden');
  const cleanup=()=>{m.classList.add('hidden');ok.onclick=null;cancel.onclick=null;};
  const ok=document.getElementById('confirm-ok'),cancel=document.getElementById('confirm-cancel');
  ok.onclick=()=>{cleanup();onOk();};cancel.onclick=cleanup;
}
function findPage(pid){return state.pages.find(p=>p.id===pid);}
function findSection(p,sid){return p?(p.sections||[]).find(s=>s.id===sid):null;}
function findElem(s,eid){return s?(s.elements||[]).find(e=>e.id===eid):null;}

document.addEventListener('click',ev=>{
  const nav=ev.target.closest('#nav button[data-view]');
  if(nav){view=nav.dataset.view;selPage=null;render();return;}
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='goto-pages'){view='pages';selPage=null;render();return;}
  if(act==='back-pages'){selPage=null;render();return;}
  if(act==='open-page'){selPage=t.dataset.id;view='pages';render();return;}
  if(act==='add-page'){
    const checks={};PAGE_TASKS.forEach(k=>checks[k]=false);
    const p={id:uid(),name:'',abbr:'',release:'',priority:DEFAULT_PRIORITY,flags:[],checks,sections:[]};
    state.pages.push(p);save();selPage=p.id;render();return;
  }
  if(act==='del-page'){confirmDialog('이 페이지를 삭제하시겠어요?',()=>{state.pages=state.pages.filter(p=>p.id!==t.dataset.id);selPage=null;save();render();});return;}
  if(act==='dup-page'){const p=findPage(t.dataset.id);if(!p)return;const np=clonePage(p);const i=state.pages.indexOf(p);state.pages.splice(i+1,0,np);save();selPage=np.id;render();return;}
  if(act==='move-page-up'||act==='move-page-down'){if(movePageInStage(t.dataset.id,act==='move-page-up'?'up':'down')){save();render();}return;}
  if(act==='dup-section'){const p=findPage(t.dataset.pid);if(!p)return;const i=(p.sections||[]).findIndex(s=>s.id===t.dataset.sid);if(i<0)return;const ns=cloneSection(p.sections[i]);p.sections.splice(i+1,0,ns);openSections.add(ns.id);save();render();return;}
  if(act==='card-noop')return;
  if(act==='toggle-page-flag'){const p=findPage(t.dataset.id);if(!p)return;p.flags=p.flags||[];const f=t.dataset.flag;if(p.flags.includes(f))p.flags=p.flags.filter(x=>x!==f);else p.flags.push(f);save();render();return;}
  if(act==='toggle-section-flag'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.flags=s.flags||[];const f=t.dataset.flag;if(s.flags.includes(f))s.flags=s.flags.filter(x=>x!==f);else s.flags.push(f);save();render();return;}
  if(act==='add-section'){const p=findPage(t.dataset.id);if(!p)return;p.sections=p.sections||[];const stages={};SECTION_STAGES.forEach(k=>stages[k]=false);const s={id:uid(),name:'',abbr:'',flags:[],stages,elements:[]};p.sections.push(s);openSections.add(s.id);save();render();return;}
  if(act==='toggle-section'){const sid=t.dataset.id;if(openSections.has(sid))openSections.delete(sid);else openSections.add(sid);render();return;}
  if(act==='del-section'){confirmDialog('섹션을 삭제하시겠어요?',()=>{const p=findPage(t.dataset.pid);if(!p)return;p.sections=(p.sections||[]).filter(s=>s.id!==t.dataset.sid);save();render();});return;}
  if(act==='move-section-up'||act==='move-section-down'){const p=findPage(t.dataset.pid);if(!p)return;const i=p.sections.findIndex(s=>s.id===t.dataset.sid),j=act==='move-section-up'?i-1:i+1;if(j<0||j>=p.sections.length)return;[p.sections[i],p.sections[j]]=[p.sections[j],p.sections[i]];save();render();return;}
  if(act==='add-elem'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.elements=s.elements||[];s.elements.push({id:uid(),type:t.dataset.type,label:'',done:false,assetPath:'',ixs:[]});save();render();return;}
  if(act==='del-elem'){confirmDialog('유닛을 삭제하시겠어요?',()=>{const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.elements=(s.elements||[]).filter(e=>e.id!==t.dataset.eid);save();render();});return;}
  if(act==='move-elem-up'||act==='move-elem-down'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;const i=s.elements.findIndex(e=>e.id===t.dataset.eid),j=act==='move-elem-up'?i-1:i+1;if(j<0||j>=s.elements.length)return;[s.elements[i],s.elements[j]]=[s.elements[j],s.elements[i]];save();render();return;}
  if(act==='toggle-ix-panel'){const eid=t.dataset.eid;const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,eid);if(!e)return;e.ixs=e.ixs||[];if(e.ixs.length===0){const ix={id:uid(),trigger:'스크롤 진입',action:'페이드인',device:'둘다',duration:'',delay:'',easing:'',link:'',memo:'',actual:'',done:false,params:{}};e.ixs.push(ix);openIxPanels.add(eid);editingIx.add(ix.id);save();render();return;}if(openIxPanels.has(eid))openIxPanels.delete(eid);else openIxPanels.add(eid);render();return;}
  if(act==='ix-add'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e)return;e.ixs=e.ixs||[];const ix={id:uid(),trigger:'스크롤 진입',action:'페이드인',device:'둘다',duration:'',delay:'',easing:'',link:'',memo:'',actual:'',done:false,params:{}};e.ixs.push(ix);openIxPanels.add(t.dataset.eid);editingIx.add(ix.id);save();render();return;}
  if(act==='ix-edit'){editingIx.add(t.dataset.iid);render();return;}
  if(act==='ix-register'){editingIx.delete(t.dataset.iid);save();render();return;}
  if(act==='ix-delete'){confirmDialog('이 인터랙션을 삭제할까요?',()=>{const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e)return;e.ixs=(e.ixs||[]).filter(ix=>ix.id!==t.dataset.iid);editingIx.delete(t.dataset.iid);save();render();});return;}
  if(act==='goto-elem'){selPage=t.dataset.page;openSections.add(t.dataset.section);view='pages';render();return;}
  if(act==='goto-section'){selPage=t.dataset.pid;openSections.add(t.dataset.sid);view='pages';render();return;}
  if(act==='goto-ix'){selPage=t.dataset.page;openSections.add(t.dataset.section);openIxPanels.add(t.dataset.eid);if(t.dataset.iid)editingIx.add(t.dataset.iid);view='pages';render();return;}
  if(act==='add-stage'){state.meta.stages=state.meta.stages||[];state.meta.stages.push('');save();render();return;}
  if(act==='del-stage'){const idx=parseInt(t.dataset.idx);confirmDialog('단계를 삭제하시겠어요?',()=>{const removed=state.meta.stages[idx];state.meta.stages.splice(idx,1);if(state.meta.dates)delete state.meta.dates[removed];state.pages.forEach(p=>{if(p.release===removed)p.release='';});save();render();});return;}
  if(act==='move-stage-up'||act==='move-stage-down'){const idx=parseInt(t.dataset.idx),j=act==='move-stage-up'?idx-1:idx+1;if(j<0||j>=state.meta.stages.length)return;[state.meta.stages[idx],state.meta.stages[j]]=[state.meta.stages[j],state.meta.stages[idx]];save();render();return;}
  if(act==='export'){doExport();return;}
  if(act==='import'){document.getElementById('import-file').click();return;}
  if(act==='reset'){confirmDialog('정말 모든 데이터를 삭제하시겠어요?',async()=>{state={meta:{stages:[...DEFAULT_RELEASES],dates:{}},pages:[]};selPage=null;openSections.clear();openIxPanels.clear();editingIx.clear();await save();render();});return;}
});

document.addEventListener('change',ev=>{
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='toggle-page-check'){const p=findPage(t.dataset.id);if(!p)return;p.checks=p.checks||{};p.checks[t.dataset.key]=t.checked;save();render();return;}
  if(act==='toggle-section-stage'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(!s)return;s.stages=s.stages||{};s.stages[t.dataset.key]=t.checked;save();render();return;}
  if(act==='set-elem-status'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(!e)return;e.status=t.value;save();render();return;}
  if(act==='set-ix-status'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);const ix=e&&(e.ixs||[]).find(x=>x.id===t.dataset.iid);if(!ix)return;ix.status=t.value;save();render();return;}
  if(act==='edit-page-release'){const p=findPage(t.dataset.id);if(!p)return;p.release=t.value;save();render();return;}
  if(act==='set-page-priority'){const p=findPage(t.dataset.id);if(!p)return;p.priority=t.value||DEFAULT_PRIORITY;save();render();return;}
  if(act==='set-meta'){state.meta[t.dataset.key]=t.value;save();render();return;}
  if(act==='set-stage-date'){const idx=parseInt(t.dataset.idx),name=state.meta.stages&&state.meta.stages[idx];if(!name)return;state.meta.dates=state.meta.dates||{};if(t.value)state.meta.dates[name]=t.value;else delete state.meta.dates[name];save();render();return;}
  if(act==='set-ix'&&t.dataset.key==='action'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);const ix=e&&(e.ixs||[]).find(x=>x.id===t.dataset.iid);if(ix){ix.action=t.value;save();render();}return;}
  if(act==='set-ix-param'&&t.type==='checkbox'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);const ix=e&&(e.ixs||[]).find(x=>x.id===t.dataset.iid);if(ix){ix.params=ix.params||{};ix.params[t.dataset.key]=t.checked;save();}return;}
});

let inputTimer=null;
document.addEventListener('input',ev=>{
  const t=ev.target.closest('[data-act]');if(!t)return;
  const act=t.dataset.act;
  if(act==='edit-page-name'){const p=findPage(t.dataset.id);if(p)p.name=t.value;}
  else if(act==='edit-page-abbr'){const p=findPage(t.dataset.id);if(p){const v=t.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();if(v!==t.value)t.value=v;p.abbr=v;}}
  else if(act==='edit-section-name'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(s)s.name=t.value;}
  else if(act==='edit-section-abbr'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid);if(s){const v=t.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();if(v!==t.value)t.value=v;s.abbr=v;}}
  else if(act==='edit-elem-label'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e)e.label=t.value;}
  else if(act==='edit-elem-asset'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e)e.assetPath=t.value;}
  else if(act==='edit-elem-effect'){const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);if(e)e.effect=t.value;}
  else if(act==='set-ix'){if(t.dataset.key==='action')return;const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);const ix=e&&(e.ixs||[]).find(x=>x.id===t.dataset.iid);if(ix)ix[t.dataset.key]=t.value;}
  else if(act==='set-ix-param'){if(t.type==='checkbox')return;const p=findPage(t.dataset.pid),s=findSection(p,t.dataset.sid),e=findElem(s,t.dataset.eid);const ix=e&&(e.ixs||[]).find(x=>x.id===t.dataset.iid);if(ix){ix.params=ix.params||{};ix.params[t.dataset.key]=t.value;}}
  else if(act==='set-meta'){state.meta[t.dataset.key]=t.value;}
  else if(act==='edit-stage'){const idx=parseInt(t.dataset.idx),old=state.meta.stages[idx];state.meta.stages[idx]=t.value;state.pages.forEach(p=>{if(p.release===old)p.release=t.value;});if(state.meta.dates&&old!==t.value&&old in state.meta.dates){state.meta.dates[t.value]=state.meta.dates[old];delete state.meta.dates[old];}}
  else return;
  clearTimeout(inputTimer);inputTimer=setTimeout(()=>save(),300);
});

function doExport(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`progress-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
}
function handleImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const data=JSON.parse(e.target.result);confirmDialog('현재 데이터를 덮어쓸까요?',async()=>{state=data;await load();await save();render();});}catch(err){alert('파일 오류: '+err.message);}};
  r.readAsText(f);ev.target.value='';
}

// ============== INIT ==============
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
load().then(render);
</script>
</body>
